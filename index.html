<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#4f46e5">
<title>小学数学 · 五 / 六年级</title>
<style>
:root{
  --brand-h:232; --brand-s:84%;
  --g-font:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,Arial,sans-serif;
  --brand:hsl(var(--brand-h),var(--brand-s),56%);
  --brand-strong:hsl(var(--brand-h),var(--brand-s),48%);
  --brand-subtle:hsl(var(--brand-h),var(--brand-s),97%);
  --surface:#fff;
  --sunken:#f9fafb;
  --text:#111827;
  --text-2:#4b5563;
  --text-3:#9ca3af;
  --border:#e5e7eb;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06);
  --r-lg:20px; --r-md:14px; --r-full:999px;
}
@media (prefers-color-scheme: dark){
  :root{
    --brand:hsl(var(--brand-h),var(--brand-s),64%);
    --brand-strong:hsl(var(--brand-h),var(--brand-s),70%);
    --brand-subtle:hsl(var(--brand-h),var(--brand-s),18%);
    --surface:#161b22;
    --sunken:#0d1117;
    --text:#e6edf3;
    --text-2:#9da7b3;
    --text-3:#6b7684;
    --border:#2d333b;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--g-font);
  background:var(--sunken);
  color:var(--text);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:calc(env(safe-area-inset-top) + 40px) 20px calc(env(safe-area-inset-bottom) + 40px);
  -webkit-font-smoothing:antialiased;
}
.wrap{width:100%;max-width:560px;}
.hero{text-align:center;margin-bottom:32px;}
.hero .badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:var(--r-full);
  background:var(--brand-subtle);color:var(--brand-strong);
  font-size:13px;font-weight:600;margin-bottom:16px;
}
.hero .badge svg{width:15px;height:15px;}
.hero h1{font-size:28px;line-height:1.25;margin:0 0 10px;font-weight:800;letter-spacing:-.02em;}
.hero p{margin:0;color:var(--text-2);font-size:15px;line-height:1.6;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media (max-width:440px){.cards{grid-template-columns:1fr;}}
.card{
  display:flex;flex-direction:column;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:22px 20px;
  text-decoration:none;color:inherit;
  box-shadow:var(--shadow);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  position:relative;overflow:hidden;
}
.card:active{transform:scale(.98);}
@media (hover:hover){.card:hover{transform:translateY(-3px);border-color:var(--brand);box-shadow:0 8px 28px rgba(79,70,229,.18);}}
.card .top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.card .icon{
  flex:none;width:46px;height:46px;border-radius:var(--r-md);
  background:var(--brand-subtle);color:var(--brand-strong);
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;
}
.card h2{margin:0;font-size:18px;font-weight:700;}
.card .grade-en{font-size:12px;color:var(--text-3);font-weight:600;letter-spacing:.04em;margin-top:2px;}
.card .desc{color:var(--text-2);font-size:13px;line-height:1.6;margin:0 0 16px;flex:1;}
.card .go{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--brand-strong);font-size:14px;font-weight:700;margin-top:auto;
}
.card .go svg{width:16px;height:16px;transition:transform .18s ease;}
@media (hover:hover){.card:hover .go svg{transform:translateX(3px);}}
.foot{margin-top:36px;text-align:center;color:var(--text-3);font-size:12px;line-height:1.7;}
.foot .tip{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--r-full);
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-2);font-size:12px;margin-bottom:14px;
}
.foot .tip svg{width:14px;height:14px;flex:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <span class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      人教版 · 小学数学
    </span>
    <h1>小学数学知识点学习</h1>
    <p>图形化讲解 · 母题精讲 · 生活应用<br>选择年级开始学习</p>
  </div>

  <div class="cards">
    <!-- AUTO-CARDS-START -->
    <a class="card" href="grade5-math.html">
      <div class="top">
        <div class="icon">5</div>
        <div>
          <h2>五年级数学</h2>
          <div class="grade-en">GRADE 5 · MATH</div>
        </div>
      </div>
      <p class="desc">北京五年级数学 · 母题学习系统</p>
      <span class="go">开始学习
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </span>
    </a>

    <a class="card" href="g6-math-fractions.html">
      <div class="top">
        <div class="icon">6</div>
        <div>
          <h2>分数专题</h2>
          <div class="grade-en">GRADE 6 · MATH</div>
        </div>
      </div>
      <p class="desc">分数专题 · 彻底学会分数</p>
      <span class="go">开始学习
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </span>
    </a>

    <a class="card" href="grade6-math.html">
      <div class="top">
        <div class="icon">6</div>
        <div>
          <h2>六年级数学</h2>
          <div class="grade-en">GRADE 6 · MATH</div>
        </div>
      </div>
      <p class="desc">北京六年级数学 · 母题学习系统</p>
      <span class="go">开始学习
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </span>
    </a>
<!-- AUTO-CARDS-END -->
  </div>

  <div class="foot">
    <div class="tip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      iPad / iPhone:用 Safari 打开后「添加到主屏幕」即可全屏使用
    </div>
    <div>依据人教版(PEP)教材整理 · 供个人学习使用</div>
  </div>
</div>
</body>
</html>
