<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="x5-fullscreen" content="true">
<title>北京五年级数学 · 母题学习系统</title>
<style>
/* ========== TIER 1 · GLOBAL TOKENS (genius-design-tokens) ========== */
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --brand-h:232; --brand-s:84%;
  --g-primary-50:hsl(var(--brand-h),var(--brand-s),97%);
  --g-primary-100:hsl(var(--brand-h),var(--brand-s),93%);
  --g-primary-200:hsl(var(--brand-h),var(--brand-s),86%);
  --g-primary-500:hsl(var(--brand-h),var(--brand-s),56%);
  --g-primary-600:hsl(var(--brand-h),var(--brand-s),48%);
  --g-primary-700:hsl(var(--brand-h),var(--brand-s),40%);
  --g-neutral-0:#fff; --g-neutral-50:#f9fafb; --g-neutral-100:#f3f4f6;
  --g-neutral-200:#e5e7eb; --g-neutral-300:#d1d5db; --g-neutral-400:#9ca3af;
  --g-neutral-500:#6b7280; --g-neutral-600:#4b5563; --g-neutral-700:#374151;
  --g-neutral-800:#1f2937; --g-neutral-900:#111827;
  --g-green-500:#16a34a; --g-green-100:#dcfce7; --g-green-700:#15803d;
  --g-amber-500:#d97706; --g-amber-100:#fef3c7; --g-amber-700:#b45309;
  --g-red-500:#dc2626; --g-red-100:#fee2e2; --g-red-700:#b91c1c;
  --g-cyan-500:#0891b2; --g-cyan-100:#cffafe;
  /* spacing 4px base */
  --g-sp-1:4px;--g-sp-2:8px;--g-sp-3:12px;--g-sp-4:16px;--g-sp-5:20px;--g-sp-6:24px;--g-sp-8:32px;--g-sp-10:40px;
  --g-r-sm:6px;--g-r-md:8px;--g-r-lg:12px;--g-r-xl:16px;--g-r-full:999px;
  --g-font:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,Arial,sans-serif;
  --g-fs-xs:12px;--g-fs-sm:13px;--g-fs-base:14px;--g-fs-md:16px;--g-fs-lg:18px;--g-fs-xl:22px;--g-fs-2xl:26px;
  --g-fw-medium:500;--g-fw-semibold:600;--g-fw-bold:700;
  --g-lh-base:1.6;
  --g-dur-base:180ms; --g-ease:cubic-bezier(.4,0,.2,1);
  /* breakpoints (container) */
  --g-bp-md:768px;
  /* icon tokens (genius-design-icons) */
  --g-icon-sm:16px;--g-icon-md:20px;--g-icon-lg:24px;--g-icon-xl:32px;--g-icon-2xl:44px;
  --g-icon-stroke:2;
}
/* ========== TIER 2 · SEMANTIC ========== */
:root{
  --s-brand:var(--g-primary-600); --s-brand-hover:var(--g-primary-700);
  --s-brand-subtle:var(--g-primary-50); --s-brand-subtle-2:var(--g-primary-100);
  --s-on-brand:#fff;
  --s-bg:#f6f7f9; --s-surface:var(--g-neutral-0); --s-surface-sunken:var(--g-neutral-50);
  --s-surface-hover:var(--g-neutral-100);
  --s-text:var(--g-neutral-900); --s-text-secondary:var(--g-neutral-600); --s-text-muted:var(--g-neutral-400);
  --s-border:var(--g-neutral-200); --s-border-strong:var(--g-neutral-300);
  --s-success:var(--g-green-500);--s-success-bg:var(--g-green-100);--s-success-text:var(--g-green-700);
  --s-warning:var(--g-amber-500);--s-warning-bg:var(--g-amber-100);--s-warning-text:var(--g-amber-700);
  --s-danger:var(--g-red-500);--s-danger-bg:var(--g-red-100);--s-danger-text:var(--g-red-700);
  --s-info:var(--g-cyan-500);--s-info-bg:var(--g-cyan-100);
  --s-shadow-sm:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);
  --s-shadow-md:0 4px 8px -2px rgba(16,24,40,.10),0 2px 4px -2px rgba(16,24,40,.06);
  --s-shadow-lg:0 12px 24px -6px rgba(16,24,40,.14),0 4px 8px -4px rgba(16,24,40,.08);
  /* icon semantic roles */
  --s-icon-color:var(--s-text-secondary); --s-icon-brand:var(--s-brand);
}
[data-theme="dark"]{
  --g-primary-50:hsl(var(--brand-h),var(--brand-s),18%);
  --g-primary-100:hsl(var(--brand-h),var(--brand-s),22%);
  --s-brand:var(--g-primary-500);
  --s-bg:#0d1117;--s-surface:#161b22;--s-surface-sunken:#1c2129;--s-surface-hover:#21262d;
  --s-text:#e6edf3;--s-text-secondary:#9da7b3;--s-text-muted:#6e7681;
  --s-border:#2d333b;--s-border-strong:#444c56;
  --s-brand-subtle:#1a2138;--s-brand-subtle-2:#232c4d;
  --s-success-bg:#052e16;--s-warning-bg:#451a03;--s-danger-bg:#450a0a;--s-info-bg:#083344;
  --s-success-text:#4ade80;--s-warning-text:#fbbf24;--s-danger-text:#f87171;
  --s-shadow-sm:0 1px 2px rgba(0,0,0,.4);--s-shadow-md:0 4px 12px rgba(0,0,0,.5);--s-shadow-lg:0 16px 32px rgba(0,0,0,.6);
}

/* ========== BASE ========== */
html,body{margin:0;padding:0;}
body{
  font-family:var(--g-font);background:var(--s-bg);color:var(--s-text);
  font-size:var(--g-fs-base);line-height:var(--g-lh-base);
  -webkit-text-size-adjust:100%;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
}
/* ========== ICON base (.ico) ========== */
.ico{width:var(--g-icon-md);height:var(--g-icon-md);display:inline-block;
     vertical-align:-.15em;stroke-width:var(--g-icon-stroke);color:inherit;flex:none;}
.ico--sm{width:var(--g-icon-sm);height:var(--g-icon-sm);}
.ico--lg{width:var(--g-icon-lg);height:var(--g-icon-lg);}
.ico--xl{width:var(--g-icon-xl);height:var(--g-icon-xl);}
.ico--2xl{width:var(--g-icon-2xl);height:var(--g-icon-2xl);}

/* ========== LAYOUT (genius-design-layout) — mobile-first container ========== */
.app{max-width:var(--g-bp-md);margin:0 auto;background:var(--s-bg);min-height:100vh;position:relative;}
.topbar{position:sticky;top:0;z-index:100;
  background:linear-gradient(135deg,var(--g-primary-600),hsl(258,70%,55%));
  color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 16px 16px;
  box-shadow:var(--s-shadow-md);}
.topbar-row{display:flex;align-items:center;gap:10px;}
.topbar h1{margin:0;font-size:var(--g-fs-lg);font-weight:var(--g-fw-bold);flex:1;}
.topbar p{margin:4px 0 0;font-size:var(--g-fs-xs);opacity:.9;}
.theme-btn{background:rgba(255,255,255,.18);border:0;color:#fff;width:36px;height:36px;
  border-radius:var(--g-r-full);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.kpis{display:flex;gap:8px;margin-top:12px;}
.kpis .k{flex:1;background:rgba(255,255,255,.15);border-radius:var(--g-r-md);padding:8px;text-align:center;}
.kpis .k b{font-size:var(--g-fs-lg);display:block;}
.kpis .k span{font-size:var(--g-fs-xs);opacity:.9;}

.view{display:none;padding:16px;animation:fade var(--g-dur-base) var(--g-ease);}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.sec-title{display:flex;align-items:center;gap:8px;font-size:var(--g-fs-md);font-weight:var(--g-fw-bold);
  margin:20px 0 12px;color:var(--s-text);}
.sec-title:first-child{margin-top:4px;}
.sec-title .ico{color:var(--s-brand);}
.hint{font-size:var(--g-fs-sm);color:var(--s-text-secondary);margin:0 0 12px;}

/* card */
.card{background:var(--s-surface);border:1px solid var(--s-border);border-radius:var(--g-r-lg);
  padding:16px;box-shadow:var(--s-shadow-sm);margin-bottom:12px;}

/* ===== 知识点视图 ===== */
.unit-group{margin-bottom:16px;}
.unit-badge{display:inline-flex;align-items:center;gap:6px;background:var(--s-brand);color:#fff;
  font-size:var(--g-fs-xs);font-weight:var(--g-fw-semibold);padding:4px 12px;border-radius:var(--g-r-full);margin-bottom:10px;}
.kp-grid{display:grid;grid-template-columns:1fr;gap:10px;}
@media(min-width:560px){.kp-grid{grid-template-columns:1fr 1fr;}}
.kp{display:flex;gap:12px;background:var(--s-surface);border:1px solid var(--s-border);
  border-radius:var(--g-r-lg);padding:14px;box-shadow:var(--s-shadow-sm);transition:transform var(--g-dur-base) var(--g-ease),box-shadow var(--g-dur-base) var(--g-ease);}
.kp:active{transform:scale(.98);}
.kp-ic{width:40px;height:40px;flex:none;border-radius:var(--g-r-md);background:var(--s-brand-subtle);
  color:var(--s-brand);display:flex;align-items:center;justify-content:center;}
.kp-body h4{margin:0 0 4px;font-size:var(--g-fs-base);font-weight:var(--g-fw-semibold);}
.kp-body p{margin:0;font-size:var(--g-fs-xs);color:var(--s-text-secondary);line-height:1.5;}

/* ===== 母题视图(清爽版:留白 + 分隔线,去除多余色块) ===== */
.mother{background:var(--s-surface);border:1px solid var(--s-border);
  border-radius:var(--g-r-lg);padding:18px 18px 16px;box-shadow:var(--s-shadow-sm);margin-bottom:14px;}
.mother-head{display:flex;align-items:center;gap:12px;}
.mother-no{width:34px;height:34px;flex:none;border-radius:var(--g-r-md);
  background:var(--s-brand-subtle);color:var(--s-brand);
  display:flex;align-items:center;justify-content:center;}
.mother-head h4{margin:0;font-size:var(--g-fs-md);font-weight:var(--g-fw-bold);line-height:1.3;flex:1;}
/* 解题模型:去底色,改左细线 + 柔和标签 */
.model-box{margin:14px 0 0;padding:0 0 0 12px;border-left:2px solid var(--s-brand-subtle-2);}
.model-label{display:block;font-size:var(--g-fs-xs);color:var(--s-text-muted);
  font-weight:var(--g-fw-semibold);letter-spacing:.04em;margin-bottom:3px;}
.model-text{font-size:var(--g-fs-sm);color:var(--s-text-secondary);line-height:1.55;}
/* 多条公式:每条独立一行,竖排更清爽 */
.model-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:5px;}
.model-list li{display:flex;align-items:baseline;gap:7px;font-size:var(--g-fs-sm);
  color:var(--s-text-secondary);line-height:1.5;}
.model-list li::before{content:"";flex:none;width:5px;height:5px;margin-top:6px;border-radius:var(--g-r-full);
  background:var(--s-brand);opacity:.7;}
.model-list .mf-name{color:var(--s-text);font-weight:var(--g-fw-medium);}
/* 示例:用一条分隔线与上文隔开,无底色 */
.example{margin-top:14px;padding-top:14px;border-top:1px dashed var(--s-border);
  font-size:var(--g-fs-sm);color:var(--s-text);line-height:1.6;}
.example-label{display:block;font-size:var(--g-fs-xs);color:var(--s-text-muted);
  font-weight:var(--g-fw-semibold);margin-bottom:5px;}
.example .ans-tag{display:inline-flex;align-items:center;gap:5px;color:var(--s-success);
  font-weight:var(--g-fw-semibold);margin-top:8px;font-size:var(--g-fs-xs);}
/* 示例解题过程(结合技巧,代入具体数字) */
.solve-steps{list-style:none;margin:10px 0 4px;padding:12px 12px 8px;
  background:var(--s-surface-sunken);border:1px solid var(--s-border);border-radius:var(--g-r-md);
  counter-reset:sv;}
.solve-steps li{position:relative;padding:3px 0 3px 24px;font-size:var(--g-fs-sm);
  color:var(--s-text-secondary);line-height:1.55;}
.solve-steps li::before{counter-increment:sv;content:counter(sv);position:absolute;left:0;top:4px;
  width:16px;height:16px;border-radius:var(--g-r-full);background:var(--s-brand);color:#fff;
  font-size:10px;font-weight:var(--g-fw-bold);display:flex;align-items:center;justify-content:center;}
.solve-steps li b{color:var(--s-brand);}
/* 图文并茂解题技巧 */
.tip{margin-top:14px;padding-top:14px;border-top:1px dashed var(--s-border);}
.tip-label{display:flex;align-items:center;gap:5px;font-size:var(--g-fs-xs);color:var(--s-warning-text);
  font-weight:var(--g-fw-semibold);margin-bottom:10px;}
.tip-label .ico{color:var(--s-warning);}
.tip-fig{background:var(--s-surface-sunken);border:1px solid var(--s-border);border-radius:var(--g-r-md);
  padding:12px;margin-bottom:10px;text-align:center;}
.tip-fig svg{max-width:100%;height:auto;display:block;margin:0 auto;}
/* SVG 内配色跟随主题 */
.tip-fig .fig-line{stroke:var(--s-text-secondary);stroke-width:1.5;fill:none;}
.tip-fig .fig-brand{stroke:var(--s-brand);stroke-width:2;fill:none;}
.tip-fig .fig-brand-fill{fill:var(--s-brand-subtle-2);stroke:var(--s-brand);stroke-width:1.5;}
.tip-fig .fig-warn-fill{fill:var(--s-warning-bg);stroke:var(--s-warning);stroke-width:1.5;}
.tip-fig .fig-green-fill{fill:var(--s-success-bg);stroke:var(--s-success);stroke-width:1.5;}
.tip-fig .fig-dash{stroke:var(--s-text-muted);stroke-width:1.2;stroke-dasharray:4 3;fill:none;}
.tip-fig .fig-t{fill:var(--s-text);font-size:11px;font-family:var(--g-font);}
.tip-fig .fig-t-mut{fill:var(--s-text-muted);font-size:10px;font-family:var(--g-font);}
.tip-fig .fig-t-brand{fill:var(--s-brand);font-size:11px;font-weight:600;font-family:var(--g-font);}
.tip-fig .fig-dot{fill:var(--s-success);}
.tip-steps{list-style:none;margin:0;padding:0;counter-reset:step;}
.tip-steps li{position:relative;padding:4px 0 4px 26px;font-size:var(--g-fs-sm);color:var(--s-text-secondary);line-height:1.5;}
.tip-steps li::before{counter-increment:step;content:counter(step);position:absolute;left:0;top:4px;
  width:18px;height:18px;border-radius:var(--g-r-full);background:var(--s-brand-subtle);color:var(--s-brand);
  font-size:11px;font-weight:var(--g-fw-bold);display:flex;align-items:center;justify-content:center;}
.tip-key{background:var(--s-warning-bg);color:var(--s-warning-text);border-radius:var(--g-r-sm);
  padding:1px 6px;font-weight:var(--g-fw-semibold);font-size:var(--g-fs-xs);}

/* ===== 应用/练习视图 ===== */
.controls{background:var(--s-surface);border:1px solid var(--s-border);border-radius:var(--g-r-lg);
  padding:14px;box-shadow:var(--s-shadow-sm);margin-bottom:14px;}
.control-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.field{flex:1;min-width:130px;}
.field label{display:block;font-size:var(--g-fs-xs);color:var(--s-text-secondary);margin-bottom:4px;}
select{width:100%;padding:9px 10px;border:1px solid var(--s-border-strong);border-radius:var(--g-r-md);
  background:var(--s-surface);color:var(--s-text);font-size:var(--g-fs-base);font-family:inherit;
  -webkit-appearance:none;appearance:none;}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;
  border-radius:var(--g-r-md);font-size:var(--g-fs-base);font-weight:var(--g-fw-semibold);
  border:1px solid var(--s-border-strong);background:var(--s-surface);color:var(--s-text);cursor:pointer;
  flex:1;min-width:120px;transition:opacity var(--g-dur-base) var(--g-ease);}
.btn:active{opacity:.85;}
.btn.primary{background:var(--s-brand);color:#fff;border-color:var(--s-brand);}
.btn.ghost{color:var(--s-brand);border-color:var(--s-brand);background:var(--s-surface);}
.score{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;padding:10px;
  border-radius:var(--g-r-md);background:var(--s-brand-subtle);color:var(--s-brand);font-weight:var(--g-fw-semibold);font-size:var(--g-fs-sm);}

.set-title{display:flex;align-items:center;gap:8px;font-size:var(--g-fs-md);font-weight:var(--g-fw-bold);
  margin:18px 0 10px;color:var(--s-brand);}
.q{background:var(--s-surface);border:1px solid var(--s-border);border-radius:var(--g-r-lg);
  padding:14px;box-shadow:var(--s-shadow-sm);margin-bottom:10px;}
.q-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;}
.q-tag{display:inline-flex;align-items:center;gap:5px;background:var(--s-brand-subtle);color:var(--s-brand);
  font-size:var(--g-fs-xs);font-weight:var(--g-fw-semibold);padding:3px 10px;border-radius:var(--g-r-full);}
.q-no{font-size:var(--g-fs-xs);color:var(--s-text-muted);}
.q-text{font-size:var(--g-fs-base);line-height:1.7;}
.q-input-row{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
.q-input-row input{width:110px;padding:8px 10px;border:1px solid var(--s-border-strong);
  border-radius:var(--g-r-md);font-size:var(--g-fs-base);background:var(--s-surface);color:var(--s-text);}
.q-unit{color:var(--s-text-secondary);font-size:var(--g-fs-sm);}
.fb{display:inline-flex;align-items:center;gap:3px;font-weight:var(--g-fw-semibold);font-size:var(--g-fs-sm);}
.fb.right{color:var(--s-success);} .fb.wrong{color:var(--s-danger);}
.ans-line{display:none;margin-top:10px;padding:10px 12px;background:var(--s-success-bg);color:var(--s-success-text);
  border-radius:var(--g-r-md);font-size:var(--g-fs-sm);}
.ans-line.show{display:block;}

/* ===== bottom tab bar ===== */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--g-bp-md);
  display:flex;background:var(--s-surface);border-top:1px solid var(--s-border);
  padding-bottom:env(safe-area-inset-bottom);z-index:120;box-shadow:0 -2px 12px rgba(16,24,40,.06);}
.tab{flex:1;background:none;border:0;padding:8px 4px 10px;display:flex;flex-direction:column;
  align-items:center;gap:3px;color:var(--s-text-muted);cursor:pointer;font-family:inherit;
  font-size:var(--g-fs-xs);transition:color var(--g-dur-base) var(--g-ease);}
.tab.active{color:var(--s-brand);}
.tab.active .ico{transform:translateY(-1px);}
.tab .ico{transition:transform var(--g-dur-base) var(--g-ease);}

/* ===== 知识点详情页(全屏浮层) ===== */
.kp:hover{box-shadow:var(--s-shadow-md);}
.kp{cursor:pointer;}
.kp-arrow{align-self:center;margin-left:auto;color:var(--s-text-muted);flex:none;}
.detail{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:var(--g-bp-md);height:100%;background:var(--s-bg);z-index:200;
  overflow-y:auto;-webkit-overflow-scrolling:touch;visibility:hidden;
  transition:transform var(--g-dur-slow) var(--g-ease),visibility var(--g-dur-slow);}
.detail.open{transform:translateX(-50%) translateY(0);visibility:visible;}
.detail-bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;
  background:linear-gradient(135deg,var(--g-primary-600),hsl(258,70%,55%));
  color:#fff;box-shadow:var(--s-shadow-md);}
.detail-back{background:rgba(255,255,255,.18);border:0;color:#fff;
  width:36px;height:36px;flex:none;padding:0;
  border-radius:var(--g-r-full);display:flex;align-items:center;justify-content:center;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:background var(--g-dur-fast) var(--g-ease);}
.detail-back:active{transform:scale(.92);background:rgba(255,255,255,.32);}
.detail-back svg,.detail-back .ico{pointer-events:none;}
.detail-bar h2{margin:0;font-size:var(--g-fs-md);font-weight:var(--g-fw-bold);flex:1;}
.detail-bar .badge-book{background:rgba(255,255,255,.22);font-size:var(--g-fs-xs);padding:3px 10px;border-radius:var(--g-r-full);}
.detail-body{padding:16px 16px calc(32px + env(safe-area-inset-bottom));}
.d-lead{font-size:var(--g-fs-sm);color:var(--s-text-secondary);line-height:1.7;margin:0 0 16px;}
.d-block{background:var(--s-surface);border:1px solid var(--s-border);border-radius:var(--g-r-lg);
  padding:16px;box-shadow:var(--s-shadow-sm);margin-bottom:14px;}
.d-block-title{display:flex;align-items:center;gap:7px;font-size:var(--g-fs-base);font-weight:var(--g-fw-bold);
  margin:0 0 12px;color:var(--s-text);}
.d-block-title .ico{color:var(--s-brand);}
.d-fig{background:var(--s-surface-sunken);border:1px solid var(--s-border);border-radius:var(--g-r-md);
  padding:16px 12px;text-align:center;margin:4px 0 12px;}
.d-fig svg{max-width:100%;height:auto;}
.d-fig-html{text-align:left;padding:14px;}
/* 干净的分步演算图(纯 HTML,自动对齐) */
.d-steps{list-style:none;margin:0;padding:0;counter-reset:ds;display:flex;flex-direction:column;gap:10px;}
.d-steps li{position:relative;display:flex;align-items:center;gap:10px;font-size:var(--g-fs-base);color:var(--s-text);line-height:1.5;}
.d-steps li::before{counter-increment:ds;content:counter(ds);flex:none;width:22px;height:22px;border-radius:var(--g-r-full);
  background:var(--s-brand);color:#fff;font-size:var(--g-fs-xs);font-weight:var(--g-fw-bold);
  display:flex;align-items:center;justify-content:center;}
.d-steps .calc{font-family:var(--g-font-mono);}
.d-steps b{color:var(--s-brand);}
.d-expr{text-align:center;font-family:var(--g-font-mono);font-size:var(--g-fs-md);color:var(--s-text);
  padding:8px 0;background:var(--s-brand-subtle);border-radius:var(--g-r-md);margin-bottom:12px;font-weight:var(--g-fw-semibold);}
.d-caption{font-size:var(--g-fs-xs);color:var(--s-text-muted);text-align:center;margin:-6px 0 12px;}
.d-learn{font-size:var(--g-fs-sm);color:var(--s-text);line-height:1.75;margin:0 0 12px;}
.d-learn p{margin:0 0 8px;}
.d-learn p:last-child{margin-bottom:0;}
.d-learn b{color:var(--s-text);font-weight:var(--g-fw-semibold);}
.d-learn .d-key{background:var(--s-brand-subtle);color:var(--s-brand);border-radius:var(--g-r-sm);
  padding:1px 6px;font-weight:var(--g-fw-semibold);font-family:var(--g-font-mono);font-size:.94em;}
/* 易错提醒:讲究层次(容器中性 → 白卡 → 警示/正确用边缘描边点缀,不铺满色块) */
.d-warn{background:var(--s-surface-sunken);border:1px solid var(--s-border);
  border-radius:var(--g-r-md);padding:12px 13px;}
.d-warn-hd{display:flex;align-items:center;gap:6px;font-size:var(--g-fs-sm);font-weight:var(--g-fw-semibold);
  color:var(--s-warning-text);margin-bottom:9px;}
.d-warn-hd .ico{color:var(--s-warning);}
.d-warn-list{display:flex;flex-direction:column;gap:8px;}
.d-warn-card{background:var(--s-surface);border:1px solid var(--s-border);border-radius:var(--g-r-md);
  overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.d-wc-bad,.d-wc-good{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;font-size:var(--g-fs-sm);line-height:1.55;}
.d-wc-bad{background:var(--s-surface);color:var(--s-text);border-left:3px solid var(--s-warning);}
.d-wc-good{background:var(--s-surface);color:var(--s-text-secondary);border-left:3px solid var(--s-success);
  border-top:1px dashed var(--s-border);}
.d-wc-ic{flex:none;width:17px;height:17px;border-radius:var(--g-r-full);display:flex;align-items:center;justify-content:center;margin-top:1px;}
.d-wc-ic svg{width:10px;height:10px;color:#fff;}
.d-wc-ic-bad{background:var(--s-warning);}
.d-wc-ic-good{background:var(--s-success);}
.d-wc-tx{flex:1;}
.d-wc-bad .d-wc-tx b{color:var(--s-warning-text);}
.d-wc-good .d-wc-tx{color:var(--s-success-text);}
.d-wc-good .d-wc-tx b{color:var(--s-success-text);font-weight:var(--g-fw-semibold);}
.d-key{background:var(--s-warning-bg);color:var(--s-warning-text);border-radius:var(--g-r-sm);
  padding:1px 6px;font-weight:var(--g-fw-semibold);font-family:var(--g-font-mono);font-size:.94em;}
.d-eg{background:var(--s-brand-subtle);border-radius:var(--g-r-md);padding:12px 14px;font-size:var(--g-fs-sm);
  color:var(--s-text);line-height:1.7;}
.d-eg .d-eg-label{display:inline-flex;align-items:center;gap:5px;font-weight:var(--g-fw-bold);color:var(--s-brand);margin-bottom:6px;}
.d-eg b{color:var(--s-brand);}
.d-eg-q{background:var(--s-surface);border:1px solid var(--s-border);border-radius:var(--g-r-md);
  padding:9px 12px;margin:2px 0 12px;font-size:var(--g-fs-sm);color:var(--s-text);line-height:1.6;}
.d-eg-q b{color:var(--s-text);}
.d-eg .d-steps{margin-bottom:12px;gap:8px;}
.d-eg .d-steps li{font-size:var(--g-fs-sm);align-items:flex-start;}
/* 举例里的序号弱化:改为细描边小圆 + 品牌色数字,不再是重实心圆 */
.d-eg .d-steps li::before{width:18px;height:18px;background:transparent;border:1.5px solid var(--s-brand);
  color:var(--s-brand);font-size:11px;margin-top:1px;}
.d-eg-ans{display:flex;align-items:center;gap:7px;background:var(--s-success-bg);border-radius:var(--g-r-md);
  padding:9px 12px;font-size:var(--g-fs-base);color:var(--s-success-text);font-weight:var(--g-fw-bold);}
.d-eg-ans .ico{color:var(--s-success);flex:none;}
.d-eg-ans b{color:var(--s-success-text);}
/* 图形动效类(尊重 reduce-motion) */
.d-anim-dash{stroke-dasharray:5 4;animation:dashmove 1.4s linear infinite;}
.d-anim-draw{stroke-dasharray:400;stroke-dashoffset:400;animation:draw 1.6s var(--g-ease) forwards;}
.d-anim-slide{animation:slidex 2.2s var(--g-ease) infinite alternate;}
.d-anim-rot{transform-box:fill-box;transform-origin:center;animation:spin 4s linear infinite;}
.d-anim-pulse{animation:pulse 1.8s var(--g-ease) infinite;}
.d-anim-grow{transform-box:fill-box;transform-origin:bottom;animation:grow 1.4s var(--g-ease) forwards;}
.d-anim-fill{animation:fillw 1.8s var(--g-ease) infinite alternate;}
.d-anim-flip{transform-box:fill-box;transform-origin:center;animation:flip180 3.2s var(--g-ease) infinite;}
@keyframes dashmove{to{stroke-dashoffset:-18;}}
@keyframes draw{to{stroke-dashoffset:0;}}
@keyframes slidex{from{transform:translateX(0);}to{transform:translateX(46px);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
@keyframes grow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
@keyframes fillw{from{width:30px;}to{width:120px;}}
@keyframes flip180{0%,18%{transform:rotate(180deg) translateY(-6px);opacity:.85;}55%,100%{transform:rotate(0deg) translateY(0);opacity:1;}}
@media(prefers-reduced-motion:reduce){
  .d-anim-dash,.d-anim-draw,.d-anim-slide,.d-anim-rot,.d-anim-pulse,.d-anim-grow,.d-anim-fill,.d-anim-flip{animation:none;}
  .d-anim-draw{stroke-dashoffset:0;}
}

@media print{.tabbar,.topbar .theme-btn,.controls{display:none;}body{padding:0;}.view{display:block!important;}}

/* ========== 异步渲染骨架屏(Web Component 未 hydrate 前占位) ========== */
lazy-view{display:block;}
.skeleton{padding:4px 0;}
.skeleton .sk-line{height:14px;border-radius:var(--g-r-sm);background:var(--s-border);
  background:linear-gradient(90deg,var(--s-border) 25%,var(--s-brand-subtle) 37%,var(--s-border) 63%);
  background-size:400% 100%;animation:sk-shimmer 1.4s ease infinite;margin:10px 0;}
.skeleton .sk-card{height:76px;border-radius:var(--g-r-lg);margin:12px 0;
  background:linear-gradient(90deg,var(--s-border) 25%,var(--s-brand-subtle) 37%,var(--s-border) 63%);
  background-size:400% 100%;animation:sk-shimmer 1.4s ease infinite;}
@keyframes sk-shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}
@media(prefers-reduced-motion:reduce){.skeleton .sk-line,.skeleton .sk-card{animation:none;}}
</style>

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[ri(0,a.length-1)];}
function gcd(a,b){return b?gcd(b,a%b):a;}
function fracAdd(a,b,c,d){var n=a*d+c*b,m=b*d,g=gcd(n,m);return[n/g,m/g];}

 "植树问题":{book:"上册",lead:"在一条线上间隔栽树,棵数和段数不一定相等,关键看『两端栽不栽』。先算段数,再根据栽法加减 1。",
  blocks:[
   {title:"三种情况对比",ic:"ic-trees",
    fig:'<svg viewBox="0 0 260 210" width="260" height="210">'+
      (function(){
        var rows=[
          {y:34,label:"两端都栽",tree:[0,1,2,3,4],formula:"棵数 = 段数 + 1",clr:"var(--s-success)"},
          {y:104,label:"两端不栽",tree:[1,2,3],formula:"棵数 = 段数 − 1",clr:"var(--s-warning)"},
          {y:174,label:"一端栽 / 封闭一圈",tree:[0,1,2,3],formula:"棵数 = 段数",clr:"var(--s-brand)"}
        ];
        var x0=24,step=42,s='';
        for(var r=0;r<rows.length;r++){
          var row=rows[r],ly=row.y;
          s+='<text x="24" y="'+(ly-22)+'" fill="var(--s-text)" font-size="11" font-weight="700">'+row.label+'</text>';
          s+='<line x1="'+x0+'" y1="'+ly+'" x2="'+(x0+step*4)+'" y2="'+ly+'" stroke="var(--s-text-secondary)" stroke-width="2"/>';
          // 段数弧标注
          for(var g=0;g<4;g++){var mx=x0+step*g+step/2;s+='<text x="'+mx+'" y="'+(ly+16)+'" text-anchor="middle" fill="var(--s-text-muted)" font-size="9">'+(g+1)+'</text>';}
          // 5 个位置点 + 树
          for(var i=0;i<5;i++){
            var x=x0+step*i, planted=row.tree.indexOf(i)>-1;
            if(planted){
              s+='<line x1="'+x+'" y1="'+ly+'" x2="'+x+'" y2="'+(ly-12)+'" stroke="'+row.clr+'" stroke-width="2"/>';
              s+='<circle class="d-anim-pulse" cx="'+x+'" cy="'+(ly-16)+'" r="4.5" fill="'+row.clr+'" style="animation-delay:'+(i*0.15)+'s"/>';
            }else{
              s+='<circle cx="'+x+'" cy="'+ly+'" r="3" fill="none" stroke="var(--s-border)" stroke-width="1.5" stroke-dasharray="2 2"/>';
            }
          }
          s+='<text x="'+(x0+step*4+6)+'" y="'+(ly+3)+'" fill="'+row.clr+'" font-size="10" font-weight="700">'+row.tree.length+' 棵</text>';
        }
        return s;
      })()+
      '</svg>',
    caption:"绿点=栽树,空心虚线=不栽;下方数字为 4 个「段」",
    learn:'植树问题最容易错的地方是分不清<b>棵数</b>和<b>段数</b>。先求出段数 = 总长 ÷ 间隔长(上图都是 <b>4 段</b>),再看两端栽不栽——三种情况对照上图一目了然:<b>两端都栽</b>就多出 1 棵(段数+1);<b>两端都不栽</b>就少 1 棵(段数−1);<b>只栽一端</b>或<b>围成一圈</b>时棵数正好等于段数。锯木头、爬楼梯、敲钟也都是这一类问题。',
    warn:["直接用总长 ÷ 间隔当棵数,<b>忘记加减 1</b>。","没看清题目是<b>两端栽、一端栽还是封闭</b>。","锯木头问题把『锯几次』当成『锯成几段』(段数 = 次数 + 1)。"]}
  ],
  eg:{q:"一条 <b>100</b> 米长的小路,每隔 <b>5</b> 米栽一棵树,<b>两端都栽</b>,一共栽几棵?",
   steps:['先求段数 = 总长 ÷ 间隔 = <span class="calc">100 ÷ 5 = 20</span> 段',
    '判断栽法:题目说<b>两端都栽</b>',
    '对照上图第一种:棵数 = 段数 + 1 = <span class="calc">20 + 1 = 21</span>'],
   ans:"一共要栽 21 棵"}},

 "观察物体(三)":{book:"下册",lead:"从前面、上面、左面观察同一个立体图形,看到的平面形状不同。根据三个方向的视图,还能反过来还原立体。",
  blocks:[
   {title:"三视图",ic:"ic-box",
    fig:'<svg viewBox="0 0 260 200" width="260" height="200">'+
      (function(){
        // ---- 等距立体图:整数网格坐标 (i=右, j=后, k=上) 统一投影 ----
        var ax=22,ay=11,bx=-22,by=11,uz=26;   // 单位向量
        var ox=90,oy=118;                       // 网格原点(左底方块顶面的最上顶点)
        function proj(i,j,k){return [ox+i*ax+j*bx, oy+i*ay+j*by-k*uz];}
        function cube(i,j,k){
          var p=proj(i,j,k);                    // 顶面最上顶点
          var X=p[0],Y=p[1];
          var top='M '+X+' '+Y+' l '+ax+' '+ay+' l '+bx+' '+by+' l '+(-ax)+' '+(-ay)+' Z';
          // 前(右下)面:从顶面右前顶点向下
          var fx=X+ax,fy=Y+ay;
          var right='M '+fx+' '+fy+' l '+bx+' '+by+' l 0 '+uz+' l '+(-bx)+' '+(-by)+' Z';
          // 左(左下)面:从顶面左前顶点向下
          var lx=X+bx,ly=Y+by;
          var left='M '+lx+' '+ly+' l '+ax+' '+ay+' l 0 '+uz+' l '+(-ax)+' '+(-ay)+' Z';
          return '<path d="'+left+'" fill="var(--s-brand)" fill-opacity="0.30" stroke="var(--s-brand)" stroke-width="1.2" stroke-linejoin="round"/>'+
                 '<path d="'+right+'" fill="var(--s-brand)" fill-opacity="0.55" stroke="var(--s-brand)" stroke-width="1.2" stroke-linejoin="round"/>'+
                 '<path d="'+top+'" fill="var(--s-brand-subtle-2)" stroke="var(--s-brand)" stroke-width="1.2" stroke-linejoin="round"/>';
        }
        var s='<text x="66" y="24" text-anchor="middle" fill="var(--s-text-muted)" font-size="11">立体图(3 个小正方体)</text>';
        // 画序(画家算法):底层从左到右,再画顶层 —— 后画的盖住先画的
        s+=cube(0,0,0);   // 左底
        s+=cube(1,0,0);   // 右底
        s+=cube(0,0,1);   // 左上(叠在左底上)
        // ---- 右侧三视图 ----
        function grid(gx,gy,cells,label){
          var u=15,t='<text x="'+(gx+u)+'" y="'+(gy-5)+'" text-anchor="middle" fill="var(--s-text)" font-size="11" font-weight="700">'+label+'</text>';
          for(var m=0;m<cells.length;m++){var c=cells[m];
            t+='<rect x="'+(gx+c[0]*u)+'" y="'+(gy+c[1]*u)+'" width="'+u+'" height="'+u+'" fill="var(--s-brand-subtle-2)" stroke="var(--s-brand)" stroke-width="1"/>';}
          return t;
        }
        s+=grid(150,44,[[0,0],[0,1],[1,1]],"前面看");   // L 形
        s+=grid(150,116,[[0,0],[1,0]],"上面看");        // 一排 2 个
        s+=grid(216,116,[[0,0],[0,1]],"左面看");        // 竖 2 个
        return s;
      })()+
      '</svg>',
    caption:"左边是立体图,右边是它从前 / 上 / 左看到的三种平面形状",
    learn:'从<b>前面、上面、左面</b>三个方向观察同一个立体图形,看到的平面形状往往不同。把三个方向的视图<b>合起来</b>,才能确定立体的样子;反过来,给出三视图也能<b>还原</b>小正方体的摆法。观察时视线要正对物体。',
    warn:["只看一个方向就下结论,忽略<b>三个视图要合起来</b>。","把『看得见的面数』和『小正方体个数』混为一谈。","还原立体时漏掉<b>被挡住</b>的小正方体。"]}
  ],
  eg:{q:"上图这个立体,<b>前面看</b>是 L 形、<b>上面看</b>是一排 2 个、<b>左面看</b>是竖着 2 个,一共用了几个小正方体?",
   steps:['<b>上面看</b>2 个 → 底层平放 <span class="calc">2</span> 个小正方体',
    '<b>前面看</b>是 L 形,左边一列有 2 层 → 左边那个上面再叠 <span class="calc">1</span> 个',
    '<b>左面看</b>竖 2 个,印证左侧高 2 层,右侧只有 1 层',
    '合计:<span class="calc">2 + 1 = 3</span>'],
   ans:"一共用了 3 个小正方体"}},

 "因数与倍数":{book:"下册",lead:"一个数的因数、倍数是成对出现的概念;2、5、3 的倍数各有判断特征;只有 1 和它本身两个因数的是质数。",
  blocks:[
   {title:"倍数特征",ic:"ic-pi",
    figHtml:'<ol class="d-steps">'+
      '<li><b>2</b> 的倍数:个位是 <span class="calc">0/2/4/6/8</span></li>'+
      '<li><b>5</b> 的倍数:个位是 <span class="calc">0 或 5</span></li>'+
      '<li><b>3</b> 的倍数:各位数字之和是 3 的倍数</li>'+
      '</ol>',
    caption:"2、5 看个位;3 看各位数字之和",
    learn:'<b>因数与倍数</b>是相互依存的概念,只针对整数(不含 0)。判断倍数有窍门:个位是 <span class="d-key">0/2/4/6/8</span> 的是 <b>2 的倍数(偶数)</b>;个位是 <span class="d-key">0 或 5</span> 的是 <b>5 的倍数</b>;<b>各位数字之和</b>是 3 的倍数的,就是 <b>3 的倍数</b>。只有 1 和它本身两个因数的数叫<b>质数</b>,有更多因数的叫<b>合数</b>。',
    warn:["把『因数』『倍数』当成脱离另一个数的独立存在。","判断 3 的倍数时去看个位(应看<b>各位数字之和</b>)。","误以为 1 是质数(1 <b>既不是质数也不是合数</b>);2 是<b>唯一的偶质数</b>。"]}
  ],
  eg:{q:"判断 <b>126</b> 是不是 2 的倍数?是不是 3 的倍数?",
   steps:['看 2:个位是 <span class="calc">6</span>,属于 0/2/4/6/8 → 是 2 的倍数',
    '看 3:各位数字相加 <span class="calc">1 + 2 + 6 = 9</span>',
    '9 是 3 的倍数 → 126 也是 3 的倍数'],
   ans:"126 既是 2 的倍数,也是 3 的倍数"}},

 "长方体和正方体":{book:"下册",lead:"长方体有 6 个面、12 条棱、8 个顶点。表面积是 6 个面的总和,体积是占空间的大小,容积从里面量。",
  blocks:[

      '<polygon points="60,50 90,28 190,28 160,50" fill="var(--s-warning-bg)" stroke="var(--s-warning)"/>'+

  eg:{q:"一个长方体,长 <b>5</b>、宽 <b>4</b>、高 <b>3</b>(单位:分米),求它的体积。",

 "分数的意义和性质":{book:"下册",lead:"把单位『1』平均分成若干份,这样的一份或几份就是分数。分子分母同乘或同除相同的数,分数大小不变——这是约分、通分的依据。",
  blocks:[
   {title:"分数的基本性质",ic:"ic-percent",
    fig:'<svg viewBox="0 0 260 160" width="260" height="160">'+
      (function(){
        var x0=16,w=150,rows=[
          {y:20,n:1,d:2,label:"1/2"},
          {y:66,n:2,d:4,label:"2/4"},
          {y:112,n:3,d:6,label:"3/6"}
        ],h=26,s='';
        for(var r=0;r<rows.length;r++){
          var row=rows[r],cw=w/row.d;
          // 阴影部分(始终是左半宽 = w/2),用 draw 动画依次画出
          s+='<rect x="'+x0+'" y="'+row.y+'" width="'+(w/2)+'" height="'+h+'" fill="var(--s-brand-subtle-2)"/>';
          // 每一份的边框
          for(var i=0;i<row.d;i++){
            s+='<rect x="'+(x0+i*cw)+'" y="'+row.y+'" width="'+cw+'" height="'+h+'" fill="none" stroke="var(--s-brand)" stroke-width="1"/>';
          }
          // 分数标签
          s+='<text x="'+(x0+w+10)+'" y="'+(row.y+h/2+4)+'" fill="var(--s-brand)" font-size="13" font-weight="700">'+row.label+'</text>';
        }
        // 贯穿三条的竖虚线:标出阴影右边界始终对齐(值相等)
        var midX=x0+w/2;
        s+='<line class="d-anim-dash" x1="'+midX+'" y1="14" x2="'+midX+'" y2="144" stroke="var(--s-success)" stroke-width="1.5"/>';
        s+='<text x="130" y="156" text-anchor="middle" fill="var(--s-text-muted)" font-size="11">阴影一样多 → 三个分数相等</text>';
        return s;
      })()+
      '</svg>',
    caption:"份数、取的份数都翻倍(同乘),阴影大小不变 → 值相等",
    learn:'把单位"1"平均分成若干份,这样的一份或几份就是<b>分数</b>。分数的<b>基本性质</b>是:分子分母<b>同乘或同除以</b>同一个不为 0 的数,分数的大小<b>不变</b>——这是约分、通分的依据。<b>约分</b>就是分子分母同除以最大公因数化成<b>最简分数</b>;真分数小于 1,假分数大于等于 1(可化成带分数)。',
    warn:["约分时只除了分子或只除了分母,<b>没有同时做</b>。","没约到<b>最简</b>就停下(还有公因数)。","把真分数、假分数判断反(≥1 是<b>假分数</b>)。"]}
  ],
  eg:{q:"把 <b>6/8</b> 约分成最简分数。",
   steps:['找分子 6 和分母 8 的<b>最大公因数</b>:<span class="calc">2</span>',
    '分子分母<b>同时除以 2</b>:<span class="calc">6 ÷ 2 = 3</span>,<span class="calc">8 ÷ 2 = 4</span>',
    '3 和 4 已没有公因数,约到最简'],
   ans:"6/8 = 3/4(最简分数)"}},

 "分数的加法和减法":{book:"下册",lead:"同分母分数直接加减分子;异分母要先通分成相同分母,再加减,结果化成最简分数。",
  blocks:[
   {title:"异分母先通分",ic:"ic-percent",
    fig:'<svg viewBox="0 0 260 100" width="260" height="100"><rect x="20" y="24" width="100" height="16" fill="var(--s-surface)" stroke="var(--s-border)"/><rect x="20" y="24" width="33" height="16" fill="var(--s-brand-subtle-2)" stroke="var(--s-brand)"/><text x="128" y="37" fill="var(--s-text)" font-size="12">1/3</text>'+
      '<rect x="20" y="48" width="100" height="16" fill="var(--s-surface)" stroke="var(--s-border)"/><rect x="20" y="48" width="50" height="16" fill="var(--s-warning-bg)" stroke="var(--s-warning)"/><text x="128" y="61" fill="var(--s-text)" font-size="12">1/2</text>'+
      '<rect x="20" y="76" width="100" height="16" fill="var(--s-surface)" stroke="var(--s-border)"/><rect class="d-anim-draw" x="20" y="76" width="83" height="16" fill="var(--s-success-bg)" stroke="var(--s-success)"/><text x="128" y="89" fill="var(--s-success)" font-size="12" font-weight="700">= 5/6</text></svg>',
    caption:"通分到公分母 6:2/6 + 3/6 = 5/6",
    learn:'<b>同分母</b>分数相加减,分母不变,只把<b>分子相加减</b>。<b>异分母</b>分数不能直接算,要先<b>通分</b>——用两个分母的<b>最小公倍数</b>作公分母,把它们化成同分母分数,再加减。算完的结果一定要<b>约成最简分数</b>,是假分数时还可化成带分数。',
    warn:["异分母不通分就<b>分母加分母、分子加分子</b>(错误)。","同分母相加时<b>把分母也加起来</b>。","算完<b>忘记约分</b>成最简。","公分母取错(不是最小公倍数)导致数字变大易错。"]}
  ],
  eg:{q:"计算 <b>1/3 + 1/2</b>。",
   steps:['分母不同,先<b>通分</b>;公分母取 3 和 2 的最小公倍数 <span class="calc">6</span>',
    '1/3 化成 <span class="calc">2/6</span>,1/2 化成 <span class="calc">3/6</span>',
    '同分母相加,分子相加:<span class="calc">2/6 + 3/6 = 5/6</span>',
    '5/6 已是最简分数'],
   ans:"1/3 + 1/2 = 5/6"}},

 "图形的运动(三)":{book:"下册",lead:"旋转由旋转中心、方向(顺/逆时针)、角度三要素决定。旋转前后图形形状大小不变,对应点到中心的距离相等。",

/* ============ 详情页开关 ============ */
/* 把一条易错项渲染成「图文并茂」的对比卡片:
   左侧红色叉号图标 + 错误做法;若文案里含「(应… / 正确 …)」或「(错误)」等纠正线索,
   自动拆出绿色对勾「正确做法」条,形成错/对可视对比。*/
function warnCard(w){
  var bad=w, good='';
  /* 匹配末尾括号里的纠正说明,如「(应从里面量)」「(高一定要和底垂直)」,自动拆成错/对对比 */
  var m=w.match(/^(.*?)[((]([^()()]*(?:应|正确|不能|应该|一定|要和|须|里面)[^()()]*)[))][。.\s]*$/);
  if(m){ bad=m[1].replace(/[,,、\s]+$/,'')+'。'; good=m[2]; }
  else{ bad=w.replace(/\s*[((]错误[))]([。.]?)\s*$/,'$1'); }
  var s='<div class="d-warn-card">';
  s+='<div class="d-wc-bad"><span class="d-wc-ic d-wc-ic-bad"><svg class="ico ico--sm"><use href="#ic-x"/></svg></span><span class="d-wc-tx">'+bad+'</span></div>';
  if(good){
    s+='<div class="d-wc-good"><span class="d-wc-ic d-wc-ic-good"><svg class="ico ico--sm"><use href="#ic-check"/></svg></span><span class="d-wc-tx">'+good+'</span></div>';
  }
  s+='</div>';
  return s;
}

function renderMothers(){
 var box=document.getElementById('mother-content'),sel=document.getElementById('typeSel'),html='';
 MOTHERS.forEach(function(m,idx){
   var s=m.gen(),tip=TIPS[m.key];
   var tipHtml='';
   if(tip){
     tipHtml='<div class="tip"><div class="tip-label"><svg class="ico ico--sm"><use href="#ic-pencil-ruler"/></svg>图解 · 解题技巧</div>'+
       '<div class="tip-fig">'+tip.fig+'</div><ul class="tip-steps"><li>'+tip.steps.join('</li><li>')+'</li></ul></div>';
   }
   /* 多条公式(以;分隔且不止一条)竖排成 list,否则单行文本 */
   var mparts=m.model.replace(/。$/,'').split(/;|;/);
   var modelInner;
   if(mparts.length>1){
     modelInner='<ul class="model-list"><li>'+mparts.map(function(f){
       var kv=f.split(/=|＝/);
       return kv.length===2?'<span class="mf-name">'+kv[0].trim()+'</span>= '+kv[1].trim():f.trim();
     }).join('</li><li>')+'</li></ul>';
   }else{
     modelInner='<span class="model-text">'+m.model+'</span>';
   }
   html+='<div class="mother"><div class="mother-head">'+
     '<div class="mother-no"><svg class="ico ico--sm"><use href="#'+m.ic+'"/></svg></div>'+
     '<h4>母题 '+(idx+1)+' · '+m.name+'</h4></div>'+
     '<div class="model-box"><span class="model-label">解题模型</span>'+modelInner+'</div>'+
     tipHtml+
     '<div class="example"><span class="example-label">示例</span>'+s.q+
     (s.steps?'<ol class="solve-steps"><li>'+s.steps.join('</li><li>')+'</li></ol>':'')+
     '<span class="ans-tag"><svg class="ico ico--sm"><use href="#ic-check"/></svg>参考答案 '+s.a+s.unit+'</span></div></div>';
   var o=document.createElement('option');o.value=m.key;o.textContent=m.name;sel.appendChild(o);
 });
 box.innerHTML=html;
}

/* ============ 生成练习 ============ */
var CURRENT=[];
function genAll(){
 var type=document.getElementById('typeSel').value,sets=parseInt(document.getElementById('setSel').value);
 var paper=document.getElementById('paper');paper.innerHTML='';CURRENT=[];
 document.getElementById('scoreBadge').innerHTML='<svg class="ico ico--sm"><use href="#ic-award"/></svg>尚未批改';
 var idx=0,html='';
 for(var s=1;s<=sets;s++){
   html+='<div class="set-title"><svg class="ico"><use href="#ic-list-checks"/></svg>第 '+s+' 套练习</div>';
   for(var i=0;i<10;i++){
     var m=type==='all'?pick(MOTHERS):MOTHERS.find(function(x){return x.key===type;});
     var g=m.gen();CURRENT.push({a:g.a,unit:g.unit,isFrac:!!g.isFrac});var cur=idx;
     html+='<div class="q"><div class="q-head"><span class="q-tag"><svg class="ico ico--sm"><use href="#'+m.ic+'"/></svg>'+m.name+'</span>'+
       '<span class="q-no">'+s+'-'+(i+1)+'</span></div>'+
       '<div class="q-text">'+(i+1)+'. '+g.q+'</div>'+
       '<div class="q-input-row"><input id="in_'+cur+'" placeholder="'+(g.isFrac?'如 5/6':'填数值')+'"><span class="q-unit">'+g.unit+'</span><span class="fb" id="fb_'+cur+'"></span></div>'+
       '<div class="ans-line" id="an_'+cur+'"><svg class="ico ico--sm"><use href="#ic-circle-check"/></svg> 正确答案：<b>'+g.a+g.unit+'</b>　模型：'+m.model+'</div></div>';
     idx++;
   }
 }
 paper.innerHTML=html;window.scrollTo(0,document.querySelector('.controls').offsetHeight+80);
}
function checkAll(){
 if(!CURRENT.length){alert('请先点击「生成练习」');return;}
 var right=0;
 CURRENT.forEach(function(c,i){
   var raw=(document.getElementById('in_'+i).value||'').trim(),fb=document.getElementById('fb_'+i),ok=false;
   if(raw!==''){
     if(c.isFrac){var p=raw.split('/');if(p.length===2){var n=+p[0],m=+p[1],g=gcd(n,m);var tp=String(c.a).split('/').map(Number);
       ok=(m!==0)&&(n/g===tp[0]&&m/g===tp[1]||n/m===tp[0]/tp[1]);}}
     else{ok=Math.abs(parseFloat(raw)-parseFloat(c.a))<0.001;}
   }
   if(ok){right++;fb.className='fb right';fb.innerHTML='<svg class="ico ico--sm"><use href="#ic-check"/></svg>正确';}
   else{fb.className='fb wrong';fb.innerHTML='<svg class="ico ico--sm"><use href="#ic-x"/></svg>待订正';}
 });
 document.getElementById('scoreBadge').innerHTML='<svg class="ico ico--sm"><use href="#ic-award"/></svg>得分 '+right+' / '+CURRENT.length+'　正确率 '+Math.round(right/CURRENT.length*100)+'%';
}
var ansShown=false;
function toggleAllAns(){ansShown=!ansShown;document.querySelectorAll('.ans-line').forEach(function(a){a.classList.toggle('show',ansShown);});}

/* ============ Web Component · 异步惰性渲染 ============ */
/* 每个视图用 <lazy-view data-render="key"> 包裹,首屏只保留骨架屏占位,
   真正的重内容(15 张知识卡 / 8 类母题含内联 SVG / 练习卷)在
   requestAnimationFrame + requestIdleCallback 里分帧渲染,避免首次渲染过大阻塞主线程。*/
var RENDERERS={
  kp:renderKP,
  mother:function(){renderMothers();},
  quiz:function(){genAll();}
};
var idle=window.requestIdleCallback||function(cb){return setTimeout(function(){cb({timeRemaining:function(){return 12;},didTimeout:false});},1);};
(function(){
  function LazyView(){return Reflect.construct(HTMLElement,[],LazyView);}
  LazyView.prototype=Object.create(HTMLElement.prototype);
  LazyView.prototype.constructor=LazyView;
  LazyView.prototype.hydrate=function(){
    if(this._done)return;
    this._done=true;
    var key=this.getAttribute('data-render'),fn=RENDERERS[key];
    if(fn)fn();
    /* 骨架屏淡出移除,重内容已注入紧随其后的容器 */
    this.parentNode&&this.parentNode.removeChild(this);
  };
  try{customElements.define('lazy-view',LazyView);}catch(e){}
})();
function hydrateView(key){
  var lv=document.querySelector('lazy-view[data-render="'+key+'"]');
  if(lv&&typeof lv.hydrate==='function'){lv.hydrate();}
  else if(lv&&!lv._done){lv._done=true;(RENDERERS[key]||function(){})();lv.parentNode&&lv.parentNode.removeChild(lv);}
}

/* 首屏:先只渲染当前激活的知识点视图(下一帧,不阻塞首次绘制) */
requestAnimationFrame(function(){
  hydrateView('kp');
  /* 其余视图在浏览器空闲时后台预热,不影响交互 */
  idle(function(){hydrateView('mother');});
  idle(function(){hydrateView('quiz');});
});
