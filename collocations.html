<title>小学英语固定搭配大全（含发音·例句）</title>
<style>
:root{
  --bg:#f4f7fb; --card:#ffffff; --ink:#1f2a44; --sub:#5a6b8c;
  --brand:#3b6cff; --brand-soft:#e8efff; --accent:#ff7a45;
  --line:#e6ecf5; --ok:#16a34a; --shadow:0 4px 18px rgba(31,42,68,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.5;
  -webkit-text-size-adjust:100%;
}
header{
  position:sticky; top:0; z-index:20;
  background:linear-gradient(135deg,#3b6cff,#5b8bff);
  color:#fff; padding:16px 18px 14px; box-shadow:0 4px 14px rgba(59,108,255,.28);
}
header h1{margin:0;font-size:20px;font-weight:800;letter-spacing:.3px}
header p{margin:4px 0 0;font-size:12.5px;opacity:.92}
.toolbar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.toolbar input{
  flex:1 1 180px;min-width:140px;border:none;border-radius:12px;
  padding:11px 14px;font-size:15px;outline:none;background:rgba(255,255,255,.95);color:#1f2a44;
}
.chip{
  border:none;background:rgba(255,255,255,.92);color:#1f2a44;border-radius:20px;
  padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
}
.chip.on{background:#0d1b3e;color:#fff;font-weight:800}
.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
main{padding:8px 14px 60px;max-width:960px;margin:0 auto}
.cat{margin-top:20px}
.cat-h{
  display:flex;align-items:center;gap:9px;font-size:17px;font-weight:900;
  color:#0d1b3e;margin:0 4px 10px;
}
.cat-h .dot{width:9px;height:22px;border-radius:6px;background:var(--brand)}
.cat-h .n{margin-left:auto;font-size:12px;font-weight:800;color:#fff;
  background:var(--brand);padding:3px 10px;border-radius:20px}
.grid{display:grid;grid-template-columns:1fr;gap:11px}
@media(min-width:700px){.grid{grid-template-columns:1fr 1fr}}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px 15px;box-shadow:var(--shadow);
}
.top{display:flex;align-items:flex-start;gap:10px}
.phrase{font-size:18px;font-weight:800;color:var(--ink);flex:1;line-height:1.3}
.play{
  flex:none;width:40px;height:40px;border-radius:50%;border:none;
  background:var(--brand-soft);color:var(--brand);font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:transform .1s;
}
.play:active{transform:scale(.88);background:var(--brand);color:#fff}
.play.speaking{background:var(--brand);color:#fff;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.ipa{color:var(--accent);font-size:14px;margin:5px 0 2px;font-style:italic;font-family:"Times New Roman",serif}
.mean{color:var(--sub);font-size:14px;font-weight:600}
.eg{
  margin-top:9px;padding:9px 11px;background:#f7f9fd;border-radius:11px;
  border-left:3px solid var(--brand);
}
.eg .en{font-size:14px;color:var(--ink);font-weight:600}
.eg .en .mini{
  display:inline-flex;width:24px;height:24px;border-radius:50%;background:#fff;
  border:1px solid var(--line);color:var(--brand);font-size:12px;align-items:center;
  justify-content:center;vertical-align:middle;margin-left:6px;cursor:pointer;
}
.eg .zh{font-size:12.5px;color:var(--sub);margin-top:3px}
.empty{text-align:center;color:var(--sub);padding:50px 0;font-size:15px}
footer{text-align:center;color:var(--sub);font-size:12px;padding:24px 20px 40px}
.count-bar{text-align:center;font-size:12.5px;color:var(--sub);margin:6px 0 2px}
</style>
</head>

 {p:"there is / there are",ipa:"/ðeə ɪz / ðeə ɑː/",m:"有……",en:"There is a cat on the bed.",zh:"床上有一只猫。"},
 {p:"let's go",ipa:"/lets ɡəʊ/",m:"我们走吧",en:"Let's go to the park.",zh:"我们去公园吧。"},
]
};

/* ---------- 渲染 ---------- */
const app=document.getElementById('app');
const chipsBox=document.getElementById('chips');
const q=document.getElementById('q');
const cats=Object.keys(DATA);
let active="全部";
let total=0; cats.forEach(c=>total+=DATA[c].length);
document.getElementById('total').textContent=total;

/* 分类芯片 */
["全部",...cats].forEach(c=>{
  const b=document.createElement('button');
  b.className='chip'+(c==="全部"?' on':'');
  b.textContent=c==="全部"?"全部 "+total:c;
  b.onclick=()=>{active=c;[...chipsBox.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
  chipsBox.appendChild(b);
});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

function render(){
  const kw=q.value.trim().toLowerCase();
  app.innerHTML='';
  let shown=0;
  cats.forEach(cat=>{
    if(active!=="全部"&&active!==cat)return;
    const items=DATA[cat].filter(it=>{
      if(!kw)return true;
      return (it.p+it.m+it.en+it.zh).toLowerCase().includes(kw);
    });
    if(!items.length)return;
    const sec=document.createElement('section');
    sec.className='cat';
    sec.innerHTML=`<h3 class="cat-h"><span class="dot"></span>${cat}<span class="n">${items.length}</span></h3><div class="grid"></div>`;
    const grid=sec.querySelector('.grid');
    items.forEach(it=>{
      shown++;
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML=`
        <div class="top">
          <div class="phrase">${esc(it.p)}</div>
          <button class="play" data-say="${esc(it.p)}">🔊</button>
        </div>
        <div class="ipa">${esc(it.ipa)}</div>
        <div class="mean">${esc(it.m)}</div>
        <div class="eg">
          <div class="en">${esc(it.en)}<span class="mini" data-say="${esc(it.en)}">🔊</span></div>
          <div class="zh">${esc(it.zh)}</div>
        </div>`;
      grid.appendChild(card);
    });
    app.appendChild(sec);
  });
  document.getElementById('countBar').textContent=`共显示 ${shown} 条搭配`;
  if(!shown)app.innerHTML='<div class="empty">😅 没找到相关搭配，换个词试试～</div>';
}

/* ---------- 发音（Web Speech API，iPad Safari 支持） ---------- */
let curBtn=null;
function speak(text,btn){
  if(!('speechSynthesis'in window)){alert('当前浏览器不支持语音，请用 iPad Safari 打开');return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.82; u.pitch=1.05;
  const vs=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if(vs.length)u.voice=vs.find(v=>/US|United States|Samantha|Karen|Daniel/i.test(v.name))||vs[0];
  if(btn&&btn.classList.contains('play')){curBtn&&curBtn.classList.remove('speaking');curBtn=btn;btn.classList.add('speaking');}
  u.onend=()=>{btn&&btn.classList.remove('speaking');};
  u.onerror=()=>{btn&&btn.classList.remove('speaking');};
  speechSynthesis.speak(u);
}
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-say]');
  if(t)speak(t.getAttribute('data-say'),t);
});
/* 预加载语音列表 */
if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=()=>{};speechSynthesis.getVoices();}

q.addEventListener('input',render);
render();
</script>
