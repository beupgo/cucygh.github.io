                <div class="grow-step__add">${ico('ic-plus','ico--xs')} ${s.add}</div>
              </div>
            </div>`)}
        </div>
      </section>`;
  }

  renderFixit(){
    return html`
      <section class="sec">
        <div class="sec__head">
          <div class="sec__num">7</div>
          <div><div class="sec__title">火眼金睛 · 找出中式英语</div><div class="sec__sub">先猜错在哪,再点“看答案”对照 —— 发现错误比被动听更记得牢。</div></div>
        </div>
        <div class="fix-list">
          ${this.data.fixit.map((f,i) => html`
            <div class="fix-card ${this.fixReveal[i]?'fix-card--open':''}">
              <div class="fix-wrong">${ico('ic-x-circle','ico--sm')} <span>${f.wrong}</span></div>
              ${this.fixReveal[i] ? html`
                <div class="fix-right">${ico('ic-check-circle-2','ico--sm')} <span>${colorSentence(f.right)}</span>
                  <button class="speak speak--sm" style="width:32px;height:32px" @click=${e=>speak(f.right,e.currentTarget)}>${ico('ic-volume','ico--xs')}</button>
                </div>
                ${ipaLine(f.right)}
                <div class="fix-why">${ico('ic-lightbulb','ico--xs')} ${f.why}</div>
              ` : html`
                <button class="btn fix-reveal" @click=${()=>this.toggleFix(i)}>${ico('ic-eye','ico--sm')} 看答案</button>
              `}
            </div>`)}
        </div>
      </section>`;
  }

  renderMyself(){
    const q = this.data.myself[this.myIndex];
    const chosen = this.myPick>=0 ? q.options[this.myPick] : null;
    const full = chosen ? this._myFullSentence(q, chosen) : null;
    return html`
      <section class="sec">
        <div class="sec__head">
          <div class="sec__num">8</div>
          <div><div class="sec__title">造我自己的句子</div><div class="sec__sub">选一个和自己有关的词填进去 —— 和自己相关的句子最好记。</div></div>
        </div>
        <div class="my-card">
          <div class="my-progress"><span>第 ${this.myIndex+1} / ${this.data.myself.length} 个模板</span><span>${q.zh}</span></div>
          <div class="my-template">
            ${q.template.map((t,i)=> t==='__'
              ? html`<span class="my-blank ${chosen?'my-blank--filled tk tk--obj':''}">${chosen || '?'}</span>`
              : html`<span class="tk tk--${q.roles[i]||'obj'}">${t}</span>`)}
          </div>
          <div class="my-options">
            ${q.options.map((opt,i)=> html`
              <button class="word-block ${this.myPick===i?'word-block--placed':''}" @click=${()=>this.pickMy(i)}>${opt}</button>`)}
          </div>
          ${full ? html`
            <div class="my-result">
              ${ico('ic-check-circle-2','ico--sm')} 你造出了:<span class="my-result__sent">${colorSentence(full)}</span>
              <button class="speak speak--sm" style="width:32px;height:32px" @click=${e=>speak(full,e.currentTarget)}>${ico('ic-volume','ico--xs')}</button>
            </div>
            ${ipaLine(full)}` : html`<div class="my-hint">↑ 点一个词,试试造出属于你自己的句子</div>`}
          <div class="build-actions" style="margin-top:var(--g-sp-5)">
            <button class="btn btn--primary" @click=${()=>this.nextMy()}>换个模板 ${ico('ic-arrow-right','ico--sm')}</button>
          </div>
        </div>
      </section>`;
  }

  renderCompare(){
    return html`
      <section class="sec">
        <div class="sec__head">
          <div class="sec__num">9</div>
          <div><div class="sec__title">中英语序对比</div><div class="sec__sub">看清差别,才能不写“中式英语”。</div></div>
        </div>
        <div class="cmp-list">
          ${this.data.compares.map(c => html`
            <div class="cmp-card">
              <div class="cmp-row"><span class="cmp-tag cmp-tag--cn">中</span><span>${c.cn}</span></div>
              <div class="cmp-arrow">${ico('ic-arrow-down','ico--sm')}</div>
              <div class="cmp-row"><span class="cmp-tag cmp-tag--en">英</span><span>${colorSentence(c.en)}</span>
                <button class="speak speak--sm" style="width:34px;height:34px" title="朗读" @click=${e=>speak(c.en,e.currentTarget)}>${ico('ic-volume','ico--xs')}</button>
              </div>
              ${ipaLine(c.en)}
              <div class="cmp-tip">${c.tip}</div>
            </div>`)}
        </div>
      </section>`;
  }

  renderBuilder(){
    const q = this.data.builder[this.bIndex];
    const done = this.bPlaced.length === q.answer.length;
    return html`
      <section class="sec">
        <div class="sec__head">
          <div class="sec__num">10</div>
          <div><div class="sec__title">自己搭句子</div><div class="sec__sub">点一下,或把词块拖到虚线框里,按正确顺序组句。</div></div>
        </div>
        <div class="build-card">
          <div class="build-progress"><span>第 ${this.bIndex+1} / ${this.data.builder.length} 句</span><span>中文提示:${q.zh}</span></div>
          <div class="build-slots" @dragover=${e=>e.preventDefault()} @drop=${e=>this.onDropSlot(e)}>
            ${this.bPlaced.map(p => html`<span class="word-block word-block--placed tk tk--${this._slotRole(p)}">${this._bank[p].w}</span>`)}
          </div>
          <div class="build-bank">
            ${this._bank.map((b,i)=> html`
              <button class="word-block" draggable=${!(this.bPlaced.includes(i)||done)}
                @dragstart=${e=>this.onDragStart(e,i)}
                ?disabled=${this.bPlaced.includes(i)||done} @click=${()=>this.placeWord(i)}>${b.w}</button>`)}
          </div>
          ${this.bFeedback==='ok' ? html`<div class="build-feedback build-feedback--ok">${ico('ic-check-circle-2','ico--sm')} 完全正确!读一遍:「${q.answer.join(' ')}」</div>` : ''}
          ${this.bFeedback==='no' ? html`<div class="build-feedback build-feedback--no">${ico('ic-x-circle','ico--sm')} 顺序不对,正确应是:「${q.answer.join(' ')}」</div>` : ''}
          <div class="build-actions">
            <button class="btn" @click=${()=>this.resetBuild()}>${ico('ic-refresh','ico--sm')} 重来</button>
            <button class="btn btn--primary" @click=${()=>this.nextBuild()}>下一句 ${ico('ic-arrow-right','ico--sm')}</button>
          </div>
        </div>
      </section>`;
  }
  _slotRole(bankPos){
    // find the placed word's correct role by matching answer position
    const q = this.data.builder[this.bIndex];
    const orderIdx = this.bPlaced.indexOf(bankPos); // position in slots
    // role by the ORIGINAL answer index of that word (best-effort visual)
    const word = this._bank[bankPos].w;
    const ansIdx = q.answer.indexOf(word);
    return (ansIdx>=0 && q.roles) ? (q.roles[ansIdx]||'obj') : 'obj';
  }

  async firstUpdated(){ await this.updateComplete; const b=document.getElementById('boot'); if(b) b.remove(); }
}
customElements.define('sent-app', SentApp);

</script>
</body>
</html>
