/* ===================== GLOBAL RESET · box-sizing ===================== */
/* Enforce border-box on ALL elements so width/height always include
   padding + border. This is the W3C recommended default and matches
   every modern framework (Tailwind, Bootstrap 5, Arco Design, etc.).
   Must load BEFORE components.css so component dimensions are predictable. */
*, *::before, *::after { box-sizing: border-box; }
gc-*, gc-*::before, gc-*::after {
  margin: 0; padding: 0; border: 0;
  font: inherit; color: inherit; background: none;
  vertical-align: baseline; -webkit-tap-highlight-color: transparent;
}

/* ===================== TIER 1 · GLOBAL / PRIMITIVE ===================== */
:root {
  /* --- Brand hue (configurable at runtime) --- */
  --brand-h: 232;
  --brand-s: 84%;

  /* --- Primary tonal scale --- */
  --g-primary-50:  hsl(var(--brand-h), var(--brand-s), 97%);
  --g-primary-100: hsl(var(--brand-h), var(--brand-s), 93%);
  --g-primary-200: hsl(var(--brand-h), var(--brand-s), 86%);
  --g-primary-300: hsl(var(--brand-h), var(--brand-s), 76%);
  --g-primary-400: hsl(var(--brand-h), var(--brand-s), 66%);
  --g-primary-500: hsl(var(--brand-h), var(--brand-s), 56%);
  --g-primary-600: hsl(var(--brand-h), var(--brand-s), 48%);
  --g-primary-700: hsl(var(--brand-h), var(--brand-s), 40%);
  --g-primary-800: hsl(var(--brand-h), var(--brand-s), 32%);
  --g-primary-900: hsl(var(--brand-h), var(--brand-s), 24%);

  /* --- Neutral / gray scale --- */
  --g-neutral-0:   #ffffff;
  --g-neutral-50:  #f9fafb;
  --g-neutral-100: #f3f4f6;
  --g-neutral-200: #e5e7eb;
  --g-neutral-300: #d1d5db;
  --g-neutral-400: #9ca3af;
  --g-neutral-500: #6b7280;
  --g-neutral-600: #4b5563;
  --g-neutral-700: #374151;
  --g-neutral-800: #1f2937;
  --g-neutral-900: #111827;
  --g-neutral-950: #0d1117;

  /* --- Functional color scales --- */
  --g-green-500:#16a34a; --g-green-100:#dcfce7; --g-green-700:#15803d;
  --g-amber-500:#d97706; --g-amber-100:#fef3c7; --g-amber-700:#b45309;
  --g-red-500:#dc2626;   --g-red-100:#fee2e2;   --g-red-700:#b91c1c;
  --g-cyan-500:#0891b2;  --g-cyan-100:#cffafe;  --g-cyan-700:#0e7490;

  /* --- Spacing scale (4px base) --- */
  --g-sp-0:0; --g-sp-1:4px; --g-sp-2:8px; --g-sp-3:12px; --g-sp-4:16px;
  --g-sp-5:20px; --g-sp-6:24px; --g-sp-8:32px; --g-sp-10:40px; --g-sp-12:48px; --g-sp-16:64px;

  /* --- Radius --- */
  --g-r-xs:4px; --g-r-sm:6px; --g-r-md:8px; --g-r-lg:12px; --g-r-xl:16px; --g-r-full:999px;

  /* --- Border width --- */
  --g-bw-0:0; --g-bw-1:1px; --g-bw-2:2px; --g-bw-4:4px;

  /* --- Typography ---
     CJK-first fallback order. Latin-only faces (Segoe UI / Roboto / Helvetica)
     are placed AFTER the CJK families so the browser's print rasterizer does a
     correct per-glyph fallback to a Chinese face instead of dropping the glyph
     (a Latin-only face earlier in the list can swallow the fallback on some
     print pipelines, which is what made Chinese text vanish on paper). */
  --g-font: "WS CJK", -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
            "Microsoft YaHei", "Noto Sans CJK SC", "Noto Sans SC", "Source Han Sans SC",
            "WenQuanYi Micro Hei", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --g-font-mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  /* Type scale — unified ~1.2 modular ratio (Major Third-ish).
     Low end is deliberately spread (12→14→15) so caption/body/emphasis
     no longer collapse into one blurry step; headings keep a constant
     gradient so H1..H3 always pull apart. */
  --g-fs-xs:12px; --g-fs-sm:14px; --g-fs-base:15px; --g-fs-md:17px;
  --g-fs-lg:20px; --g-fs-xl:24px; --g-fs-2xl:30px; --g-fs-3xl:38px;
  --g-fw-regular:400; --g-fw-medium:500; --g-fw-semibold:600; --g-fw-bold:700;
  --g-lh-tight:1.3; --g-lh-base:1.6; --g-lh-loose:1.8;
  --g-ls-tight:-.01em; --g-ls-normal:0; --g-ls-wide:.05em;

  /* --- Motion --- */
  --g-dur-fast:120ms; --g-dur-base:160ms; --g-dur-slow:260ms;
  --g-ease:cubic-bezier(.4,0,.2,1);

  /* --- Z-index layers --- */
  --g-z-base:0; --g-z-sticky:100; --g-z-dropdown:1000;
  --g-z-overlay:1100; --g-z-modal:1200; --g-z-toast:1300; --g-z-tooltip:1400;

  /* --- Opacity --- */
  --g-op-disabled:.5; --g-op-hover:.08; --g-op-overlay:.5;

  /* --- Breakpoints --- */
  --g-bp-sm:640px; --g-bp-md:768px; --g-bp-lg:1024px; --g-bp-xl:1280px;

  /* --- Print primitives (paper domain · physical units) ---
     Theme-agnostic raw values for the PRINT scenario. They live in tier 1
     next to the screen primitives but use physical units (mm / pt) and an
     ink-safe monochrome ramp, so print stays DECOUPLED from screen
     color / theme while still SHARING the structural scales it can reuse
     (spacing --g-sp-*, radius --g-r-*, font family). */
  --g-print-page-size:   A4;        /* A4 | Letter | Legal ... */
  --g-print-page-margin: 16mm;      /* @page physical margin */
  --g-print-ink-0:       #ffffff;   /* paper white */
  --g-print-ink-100:     #f2f2f2;   /* faint fill (zebra rows) */
  --g-print-ink-200:     #d9d9d9;   /* hairline / subtle border */
  --g-print-ink-400:     #999999;   /* muted text */
  --g-print-ink-600:     #555555;   /* secondary text */
  --g-print-ink-900:     #000000;   /* body ink (max contrast) */
  --g-print-hairline:    0.5pt;     /* thinnest reliably-printed rule */
  --g-print-rule:        1pt;       /* standard printed border */
  --g-print-fs-sm:       9pt;
  --g-print-fs-base:     10.5pt;    /* body copy for paper */
  --g-print-fs-h2:       14pt;
  --g-print-fs-h1:       18pt;
  --g-print-lh:          1.45;      /* readable leading on paper */
}

/* ===================== TIER 2 · SEMANTIC / ALIAS ===================== */
:root {
  /* brand roles */
  --s-brand:            var(--g-primary-600);
  --s-brand-hover:      var(--g-primary-700);
  --s-brand-active:     var(--g-primary-800);
  --s-brand-subtle:     var(--g-primary-50);
  --s-brand-subtle-2:   var(--g-primary-100);
  --s-on-brand:         #ffffff;

  /* surfaces & background */
  --s-bg:               #f6f7f9;
  --s-surface:          var(--g-neutral-0);
  --s-surface-raised:   var(--g-neutral-0);
  --s-surface-sunken:   var(--g-neutral-50);
  --s-surface-hover:    var(--g-neutral-100);

  /* text */
  --s-text:             var(--g-neutral-900);
  --s-text-secondary:   var(--g-neutral-600);
  --s-text-muted:       var(--g-neutral-400);
  --s-text-on-fill:     #ffffff;
  --s-text-link:        var(--s-brand);

  /* type roles — the single source of the heading/body gradient.
     Components MUST reference these (not --g-fs-* directly) so the
     typographic hierarchy is defined once and stays consistent site-wide. */
  --s-fs-caption:  var(--g-fs-xs);    /* hints, meta, table-of-contents */
  --s-fs-body:     var(--g-fs-base);  /* default paragraph / control text */
  --s-fs-body-lg:  var(--g-fs-md);    /* emphasized body, card titles */
  --s-fs-h3:       var(--g-fs-lg);
  --s-fs-h2:       var(--g-fs-xl);
  --s-fs-h1:       var(--g-fs-2xl);
  --s-fs-display:  var(--g-fs-3xl);   /* hero / marketing headline */
  --s-lh-heading:  var(--g-lh-tight);
  --s-lh-body:     var(--g-lh-base);

  /* border */
  --s-border:           var(--g-neutral-200);
  --s-border-strong:    var(--g-neutral-300);
  --s-border-focus:     var(--s-brand);

  /* state · success */
  --s-success:          var(--g-green-500);
  --s-success-bg:       var(--g-green-100);
  --s-success-border:   var(--g-green-500);
  --s-success-text:     var(--g-green-700);
  /* state · warning */
  --s-warning:          var(--g-amber-500);
  --s-warning-bg:       var(--g-amber-100);
  --s-warning-border:   var(--g-amber-500);
  --s-warning-text:     var(--g-amber-700);
  /* state · danger */
  --s-danger:           var(--g-red-500);
  --s-danger-bg:        var(--g-red-100);
  --s-danger-border:    var(--g-red-500);
  --s-danger-text:      var(--g-red-700);
  --s-danger-hover:     var(--g-red-700);
  /* state · info */
  --s-info:             var(--g-cyan-500);
  --s-info-bg:          var(--g-cyan-100);
  --s-info-border:      var(--g-cyan-500);
  --s-info-text:        var(--g-cyan-700);

  /* elevation */
  --s-shadow-sm: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);
  --s-shadow-md: 0 4px 8px -2px rgba(16,24,40,.10), 0 2px 4px -2px rgba(16,24,40,.06);
  --s-shadow-lg: 0 12px 24px -6px rgba(16,24,40,.14), 0 4px 8px -4px rgba(16,24,40,.08);
  --s-shadow-focus: 0 0 0 3px hsl(var(--brand-h), var(--brand-s), 56% / .35);
  --s-shadow-focus-danger: 0 0 0 3px rgba(220,38,38,.30);

  /* shared transition */
  --s-transition: var(--g-dur-base) var(--g-ease);

  /* print semantic roles (paper domain) — the print analogue of the roles
     above. Mapped onto the ink ramp, NOT onto --s-brand / --s-surface, so
     the print scenario is decoupled from the screen theme & dark mode.
     Consumed inside @media print below (see PRINT SCENARIO). */
  --s-print-fg:            var(--g-print-ink-900);
  --s-print-fg-secondary:  var(--g-print-ink-600);
  --s-print-fg-muted:      var(--g-print-ink-400);
  --s-print-bg:            var(--g-print-ink-0);
  --s-print-fill-subtle:   var(--g-print-ink-100);
  --s-print-border:        var(--g-print-ink-200);
  --s-print-border-strong: var(--g-print-ink-600);
  --s-print-link:          var(--g-print-ink-900);
  --s-print-font:          var(--g-font);
  --s-print-font-size:     var(--g-print-fs-base);
  --s-print-line-height:   var(--g-print-lh);
}

/* dark theme overrides */
[data-theme="dark"] {
  --g-primary-50:  hsl(var(--brand-h), var(--brand-s), 18%);
  --g-primary-100: hsl(var(--brand-h), var(--brand-s), 22%);

  --s-brand:            var(--g-primary-500);
  --s-brand-hover:      var(--g-primary-400);
  --s-brand-active:     var(--g-primary-300);

  --s-bg:               var(--g-neutral-950);
  --s-surface:          #161b22;
  --s-surface-raised:   #161b22;
  --s-surface-sunken:   #1c2129;
  --s-surface-hover:    #21262d;

  --s-text:             #e6edf3;
  --s-text-secondary:   #9da7b3;
  --s-text-muted:       #6e7681;

  --s-border:           #2d333b;
  --s-border-strong:    #444c56;

  --s-success-bg:#052e16; --s-warning-bg:#451a03; --s-danger-bg:#450a0a; --s-info-bg:#083344;
  --s-success-text:#4ade80; --s-warning-text:#fbbf24; --s-danger-text:#f87171; --s-info-text:#22d3ee;

  --s-shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --s-shadow-md: 0 4px 12px rgba(0,0,0,.5);
  --s-shadow-lg: 0 16px 32px rgba(0,0,0,.6);
}

/* ===================== TIER 3 · COMPONENT ===================== */
:root {
  /* button — height-driven sizing (P3: mini/small/default/large = 24/28/32/36px) */
  --c-btn-primary-bg:        var(--s-brand);
  --c-btn-primary-bg-hover:  var(--s-brand-hover);
  --c-btn-primary-bg-active: var(--s-brand-active);
  --c-btn-primary-fg:        var(--s-on-brand);
  --c-btn-radius:            var(--g-r-md);
  --c-btn-font-weight:      var(--g-fw-semibold);
  --c-btn-h-mini:           24px;
  --c-btn-h-small:          28px;
  --c-btn-h-default:        32px;
  --c-btn-h-large:          36px;
  --c-btn-pad-x-mini:       var(--g-sp-2);   /* 8px  */
  --c-btn-pad-x-small:      var(--g-sp-3);   /* 12px */
  --c-btn-pad-x-default:    var(--g-sp-4);   /* 16px */
  --c-btn-pad-x-large:      var(--g-sp-5);   /* 20px */

  /* input */
  --c-input-bg:           var(--s-surface);
  --c-input-border:       var(--s-border-strong);
  --c-input-border-focus: var(--s-border-focus);
  --c-input-radius:       var(--g-r-md);
  --c-input-pad-y:        var(--g-sp-2);   /* 8px — was magic 10px; snap to 8pt scale */
  --c-input-pad-x:        var(--g-sp-3);   /* 12px */

  /* card */
  --c-card-bg:      var(--s-surface);
  --c-card-border:  var(--s-border);
  --c-card-radius:  var(--g-r-lg);
  --c-card-shadow:  var(--s-shadow-sm);
  --c-card-pad:     var(--g-sp-6);

  /* overlay layering */
  --c-modal-z:    var(--g-z-modal);
  --c-overlay-z:  var(--g-z-overlay);
  --c-toast-z:    var(--g-z-toast);
  --c-tooltip-z:  var(--g-z-tooltip);
  --c-sticky-z:   var(--g-z-sticky);
  --c-modal-radius: var(--g-r-xl);
  --c-modal-max-w:  440px;

  /* table */
  --c-table-head-bg:   var(--s-surface-sunken);
  --c-table-row-hover: var(--s-surface-hover);
  --c-table-border:    var(--s-border);
  /* table cell density — the core B-side density knob for data tables.
     Comfortable defaults; compact mode (below) tightens these. */
  --c-table-cell-pad-y: var(--g-sp-3);   /* 12px */
  --c-table-cell-pad-x: var(--g-sp-4);   /* 16px */

  /* badge */
  --c-badge-bg:      var(--s-brand-subtle);
  --c-badge-fg:      var(--s-brand);
  --c-badge-radius:  var(--g-r-full);
  --c-badge-pad-y:   var(--g-sp-1);
  --c-badge-pad-x:   var(--g-sp-2);
  --c-badge-fs:      var(--g-fs-xs);
  --c-badge-fw:      var(--g-fw-semibold);

  /* alert */
  --c-alert-radius:  var(--g-r-md);
  --c-alert-pad-y:   var(--g-sp-3);
  --c-alert-pad-x:   var(--g-sp-4);
  --c-alert-border:  var(--g-bw-1);

  /* tabs */
  --c-tab-fg:            var(--s-text-secondary);
  --c-tab-fg-active:     var(--s-brand);
  --c-tab-indicator:     var(--s-brand);
  --c-tab-pad-y:         var(--g-sp-3);
  --c-tab-pad-x:         var(--g-sp-4);
  --c-tab-fw-active:     var(--g-fw-semibold);

  /* switch */
  --c-switch-off:    var(--s-border-strong);
  --c-switch-on:     var(--s-brand);
  --c-switch-knob:   var(--g-neutral-0);
  --c-switch-w:      40px;
  --c-switch-h:      22px;

  /* tooltip */
  --c-tooltip-bg:     var(--g-neutral-900);
  --c-tooltip-fg:     var(--g-neutral-0);
  --c-tooltip-radius: var(--g-r-sm);
  --c-tooltip-pad-y:  var(--g-sp-1);
  --c-tooltip-pad-x:  var(--g-sp-2);
  --c-tooltip-fs:     var(--g-fs-xs);

  /* progress */
  --c-progress-track: var(--s-surface-sunken);
  --c-progress-fill:  var(--s-brand);
  --c-progress-h:     8px;
  --c-progress-radius: var(--g-r-full);

  /* avatar */
  --c-avatar-bg:     var(--s-brand-subtle-2);
  --c-avatar-fg:     var(--s-brand);
  --c-avatar-radius: var(--g-r-full);
  --c-avatar-size:   40px;

  /* tag */
  --c-tag-bg:      var(--s-surface-sunken);
  --c-tag-fg:      var(--s-text-secondary);
  --c-tag-radius:  var(--g-r-sm);
  --c-tag-pad-y:   var(--g-sp-1);
  --c-tag-pad-x:   var(--g-sp-2);
  --c-tag-fs:      var(--g-fs-xs);

  /* control (checkbox / radio shared) */
  --c-control-border: var(--s-border-strong);
  --c-control-on:     var(--s-brand);

  /* dropdown / select popup layering */
  --c-dropdown-z:  var(--g-z-dropdown);

  /* select (Arco-aligned: sizes 24/28/32/36 = mini/small/default/large) */
  --c-select-bg:            var(--s-surface);
  --c-select-border:        var(--s-border-strong);
  --c-select-border-hover:  var(--s-brand);
  --c-select-border-focus:  var(--s-border-focus);
  --c-select-radius:        var(--g-r-md);
  --c-select-pad-x:         var(--g-sp-3);
  --c-select-fg:            var(--s-text);
  --c-select-placeholder:   var(--s-text-muted);
  --c-select-arrow:         var(--s-text-muted);
  --c-select-h-mini:        24px;
  --c-select-h-small:       28px;
  --c-select-h-default:     32px;
  --c-select-h-large:       36px;
  /* popup menu */
  --c-select-menu-bg:       var(--s-surface-raised);
  --c-select-menu-border:   var(--s-border);
  --c-select-menu-radius:   var(--g-r-md);
  --c-select-menu-shadow:   var(--s-shadow-md);
  --c-select-menu-pad:      var(--g-sp-1);
  /* option states */
  --c-select-opt-fg:           var(--s-text);
  --c-select-opt-bg-hover:     var(--s-surface-hover);
  --c-select-opt-bg-selected:  var(--s-brand-subtle);
  --c-select-opt-fg-selected:  var(--s-brand);
  --c-select-opt-radius:       var(--g-r-sm);
  --c-select-opt-pad-y:        var(--g-sp-2);
  --c-select-opt-pad-x:        var(--g-sp-3);
  /* multiple-mode tag chips (reuse tag roles) */
  --c-select-tag-bg:        var(--s-surface-sunken);
  --c-select-tag-fg:        var(--s-text-secondary);
  --c-select-tag-radius:    var(--g-r-sm);
  /* group label */
  --c-select-group-fg:      var(--s-text-muted);

  /* spinner */
  --c-spinner-size:  20px;
  --c-spinner-color: var(--s-brand);

  /* drawer */
  --c-drawer-size: 360px;
}

/* ===================== DENSITY SCENARIO (B-side compact) =====================
   Density is a component-layer concern, tightened by ONE global switch —
   exactly like dark mode, but re-pointing component (--c-*) knobs instead of
   semantic color roles. Default (:root above) is COMFORTABLE (C-side friendly).
   Set data-density="compact" on <html> (or any scope) to switch a whole B-side
   view — dashboards, tables, admin — to dense spacing in one place. It ONLY
   re-points --c-* to smaller --g-sp-*/height values; NO component needs a
   density-specific rule, NO magic numbers, and theming/dark/print stay free
   because color roles are untouched. This is the missing "one knob, whole-page
   density" mechanism the B-side needs. */
[data-density="compact"] {
  /* card — 24px -> 16px */
  --c-card-pad:            var(--g-sp-4);
  /* table cells — 12/16 -> 8/12 (denser data rows) */
  --c-table-cell-pad-y:    var(--g-sp-2);
  --c-table-cell-pad-x:    var(--g-sp-3);
  /* controls step down one tier (default 32 -> 28, large 36 -> 32) */
  --c-btn-h-default:       28px;
  --c-btn-h-large:         32px;
  --c-select-h-default:    28px;
  --c-select-h-large:      32px;
  /* input padding tightens 8/12 -> 4/8 */
  --c-input-pad-y:         var(--g-sp-1);
  --c-input-pad-x:         var(--g-sp-2);
  /* tab / alert vertical rhythm down one tier */
  --c-tab-pad-y:           var(--g-sp-2);
  --c-alert-pad-y:         var(--g-sp-2);
  /* select option rows tighten */
  --c-select-opt-pad-y:    var(--g-sp-1);
}

/* ===================== PRINT SCENARIO (decoupled) =====================
   The print scenario is intentionally SEPARATE from the screen theme:
   - it does NOT read screen color tokens (--s-brand / --s-surface / dark);
   - it re-declares its own semantic layer --s-print-* mapped to the ink
     ramp, so paper output is high-contrast and ink-economical regardless
     of the active screen theme (light OR dark);
   - it REUSES only the structural primitives that are unit-neutral and
     safe to share: spacing (--g-sp-*), radius (--g-r-*), font family.
   Everything here activates only when the media is `print`. Components on
   screen are untouched; you never write print-specific rules per component
   — you re-point the --s-print-* roles here, exactly like dark mode
   re-points --s-*. ===================================================== */

@page {
  size:   var(--g-print-page-size);
  margin: var(--g-print-page-margin);
}

@media print {
  /* Force the ink-safe palette onto the document root, overriding whatever
     screen theme (light/dark) was active. Print never inherits dark mode. */
  :root, [data-theme="dark"] {
    --s-bg:      var(--s-print-bg);
    --s-surface: var(--s-print-bg);
    --s-surface-raised: var(--s-print-bg);
    --s-surface-sunken: var(--s-print-fill-subtle);
    --s-surface-hover:  var(--s-print-fill-subtle);
    --s-text:            var(--s-print-fg);
    --s-text-secondary:  var(--s-print-fg-secondary);
    --s-text-muted:      var(--s-print-fg-muted);
    --s-border:          var(--s-print-border);
    --s-border-strong:   var(--s-print-border-strong);
    --s-text-link:       var(--s-print-link);
    /* brand + state roles collapse to ink so component fills / accents
       (buttons, switches, badges, error borders, selected options) print
       as grayscale without any per-component print rule. */
    --s-brand:         var(--s-print-fg);
    --s-brand-hover:   var(--s-print-fg);
    --s-brand-active:  var(--s-print-fg);
    --s-brand-subtle:  var(--s-print-fill-subtle);
    --s-brand-subtle-2:var(--s-print-fill-subtle);
    --s-on-brand:      var(--s-print-bg);
    --s-danger:  var(--s-print-fg); --s-danger-bg:  var(--s-print-fill-subtle); --s-danger-text:  var(--s-print-fg);
    --s-success: var(--s-print-fg); --s-success-bg: var(--s-print-fill-subtle); --s-success-text: var(--s-print-fg);
    --s-warning: var(--s-print-fg); --s-warning-bg: var(--s-print-fill-subtle); --s-warning-text: var(--s-print-fg);
    --s-info:    var(--s-print-fg); --s-info-bg:    var(--s-print-fill-subtle); --s-info-text:    var(--s-print-fg);
  }

  html, body {
    background: var(--s-print-bg) !important;
    color:      var(--s-print-fg) !important;
    font-family: var(--s-print-font);
    font-size:   var(--s-print-font-size);
    line-height: var(--s-print-line-height);
    /* `exact` (standard) so our intended grays/zebra actually render;
       `economy` is not a valid value and browsers ignore it. */
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Typographic scale for paper (pt units) */
  h1 { font-size: var(--g-print-fs-h1); }
  h2 { font-size: var(--g-print-fs-h2); }
  h3, h4 { font-size: var(--g-print-fs-base); }

  /* Links: show the destination so paper is self-contained */
  a[href^="http"]::after { content: " (" attr(href) ")"; font-size: var(--g-print-fs-sm); color: var(--s-print-fg-muted); }

  /* Tables: hairline grid + zebra using ink primitives */
  table { border-collapse: collapse; width: 100%; }
  th, td { border: var(--g-print-hairline) solid var(--s-print-border); padding: var(--g-sp-2) var(--g-sp-3); }
  thead th { border-bottom: var(--g-print-rule) solid var(--s-print-border-strong); background: var(--s-print-fill-subtle); }
  tbody tr:nth-child(even) td { background: var(--s-print-fill-subtle); }

  /* Pagination control */
  h1, h2, h3, h4, thead, tr, figure, blockquote { break-inside: avoid; }
  h1, h2, h3 { break-after: avoid; }
  table, pre, .card { break-inside: avoid; }

  /* Hide interactive / decorative chrome that has no meaning on paper */
  .no-print, nav, .sidebar, .topbar, .theme-controls,
  button, .btn, [role="button"] { display: none !important; }

  /* Form controls hardcode raw color / accent-color and can't inherit vars,
     so force them to ink explicitly. */
  input[type="checkbox"], input[type="radio"], input[type="range"],
  .check input, .range { accent-color: var(--s-print-fg) !important; }

  /* Neutralize screen elevation — shadows don't print */
  * { box-shadow: none !important; text-shadow: none !important; }
}

/* =========================================================================
   GENIUS DESIGN ICONS · icons.css · v1.0
   Token-driven SVG icon layer. Load AFTER genius-design-tokens' tokens.css so
   the semantic icon roles can reference --s-* and the spacing scale.

   Tiers (mirrors genius-design-tokens):
     TIER 1  GLOBAL      --g-icon-*   raw sizes + stroke
     TIER 2  SEMANTIC    --s-icon-*   color roles, light/dark aware
     TIER 3  COMPONENT   --c-icon-*   size each component should use
   Color rule:  icons paint with currentColor — set the PARENT's color.
   Size rule:   use .ico + a size class, or a --c-icon-* token. Never px-by-hand.
   ========================================================================= */

:root {
  /* ---------- TIER 1 · GLOBAL · raw icon sizes (snapped to 4px rhythm) ---------- */
  --g-icon-xs:  14px;   /* dense inline / table cell      */
  --g-icon-sm:  16px;   /* default inline next to text    */
  --g-icon-md:  20px;   /* buttons, list rows, inputs     */
  --g-icon-lg:  24px;   /* nav, section headers           */
  --g-icon-xl:  32px;   /* feature / card                 */
  --g-icon-2xl: 40px;   /* hero / empty-state             */
  --g-icon-3xl: 64px;   /* large empty-state / marketing  */

  --g-icon-stroke:      2;     /* default optical stroke for 24-grid icons */
  --g-icon-stroke-thin: 1.5;   /* large icons can use a thinner stroke     */

  /* ---------- motion scale (durations + easings, reused across animations) ----------
     Bridged to genius-design-tokens' global motion primitives so icon timing follows
     the SAME rhythm as the rest of the system; each carries a standalone fallback so
     icons.css still animates if tokens.css is absent. */
  --g-icon-dur-fast:   var(--g-dur-fast,  .4s);   /* snappy micro-interactions  */
  --g-icon-dur:        var(--g-dur-base,  .8s);   /* default loop speed         */
  --g-icon-dur-slow:   var(--g-dur-slow, 1.6s);   /* calm ambient motion        */
  --g-icon-ease:        var(--g-ease, cubic-bezier(.4, 0, .2, 1)); /* standard ease  */
  --g-icon-ease-bounce: cubic-bezier(.34, 1.56, .64, 1);/* overshoot/pop (icon-local) */
  --g-icon-ease-spin:   linear;                         /* steady rotation (icon-local) */
}

:root {
  /* ---------- TIER 2 · SEMANTIC · icon color roles (theme aware) ---------- */
  /* These reference genius-design-tokens semantic roles when present, with a
     safe fallback so icons.css also works standalone. */
  --s-icon-color:    var(--s-text,          #111827); /* default icon color   */
  --s-icon-muted:    var(--s-text-muted,     #9ca3af); /* secondary / disabled */
  --s-icon-brand:    var(--s-brand,          #4f46e5); /* emphasis / active    */
  --s-icon-on-brand: var(--s-on-brand,       #ffffff); /* on filled brand bg   */
  --s-icon-inverse:  var(--s-text-on-fill,   #ffffff); /* on dark fills        */
  --s-icon-success:  var(--s-success,        #16a34a);
  --s-icon-warning:  var(--s-warning,        #d97706);
  --s-icon-danger:   var(--s-danger,         #dc2626);
  --s-icon-info:     var(--s-info,           #0891b2);
}

:root {
  /* ---------- TIER 3 · COMPONENT · which size each context uses ---------- */
  --c-icon-inline:  var(--g-icon-sm);   /* icon sitting beside body text   */
  --c-icon-btn:     var(--g-icon-md);   /* inside a button                 */
  --c-icon-btn-sm:  var(--g-icon-sm);   /* inside a small/compact button   */
  --c-icon-input:   var(--g-icon-md);   /* input affix / search field      */
  --c-icon-nav:     var(--g-icon-lg);   /* sidebar / top nav               */
  --c-icon-table:   var(--g-icon-xs);   /* table action icons (dense)      */
  --c-icon-alert:   var(--g-icon-md);   /* alert / toast leading icon      */
  --c-icon-card:    var(--g-icon-xl);   /* feature card icon               */
  --c-icon-empty:   var(--g-icon-2xl);  /* empty-state illustration glyph  */
  --c-icon-hero:    var(--g-icon-3xl);  /* C-side hero / marketing glyph   */
}

/* ===================== BASE CLASS ===================== */
/* .ico defaults to 1em so an icon scales with the parent's font-size out of the
   box; size utilities and --c-icon-* override that with the token scale. */
.ico {
  display: inline-block;
  width: 1em;
  height: 1em;
  flex: none;                       /* never shrink in a flex row */
  vertical-align: -0.125em;         /* optical baseline alignment */
  fill: none;
  stroke: currentColor;             /* COLOR = the resolved `color`  */
  stroke-width: var(--g-icon-stroke);
  stroke-linecap: round;
  stroke-linejoin: round;
  /* Inherit the host's color so an icon dropped into ANY component — a primary
     button, a danger alert, a brand nav item, a link, dark mode — follows that
     component's text color for free. That is the entire point of currentColor.
     Do NOT pin `color: var(--s-icon-color)` here: it severs the inheritance
     chain and freezes every icon to the default grey, so icons stop adapting to
     the theme / semantic color of their host (the bug this fixes). A bare icon
     still looks right because it inherits the page/body text color, which in the
     token system already resolves to --s-text (== the default icon color).
     To color an icon on purpose, use a role class (.ico--brand / .ico--danger /
     …) or set `color` on its parent. */
  color: inherit;
}

/* Optional default for a truly context-less icon (e.g. loaded before any text
   color is set). Kept at low specificity so ANY ancestor that sets `color`
   overrides it via normal inheritance — that override is what lets icons pick
   up their host's theme/semantic color. */
:where(body) { color: var(--s-text, var(--s-icon-color)); }


/* ---------- size utilities (pin to the global size scale) ---------- */
.ico--xs  { width: var(--g-icon-xs);  height: var(--g-icon-xs);  }
.ico--sm  { width: var(--g-icon-sm);  height: var(--g-icon-sm);  }
.ico--md  { width: var(--g-icon-md);  height: var(--g-icon-md);  }
.ico--lg  { width: var(--g-icon-lg);  height: var(--g-icon-lg);  }
.ico--xl  { width: var(--g-icon-xl);  height: var(--g-icon-xl);  stroke-width: var(--g-icon-stroke-thin); }
.ico--2xl { width: var(--g-icon-2xl); height: var(--g-icon-2xl); stroke-width: var(--g-icon-stroke-thin); }
.ico--3xl { width: var(--g-icon-3xl); height: var(--g-icon-3xl); stroke-width: var(--g-icon-stroke-thin); }

/* The sprite's <symbol> carries stroke-width="2" as a presentation attribute so
   icons render even with a bare <use> (the attribute is inherited by the symbol
   geometry through the <use> shadow tree — a plain CSS stroke-width on .ico does
   NOT cross that boundary). To let the size utilities still re-thin large icons,
   re-assert stroke-width via the symbol selector, which wins over the attribute. */
.ico--xl  use, .ico--2xl use, .ico--3xl use { stroke-width: var(--g-icon-stroke-thin); }
.ico use { stroke-width: var(--g-icon-stroke); }

/* ---------- component-bound sizes (track a --c-icon-* token) ---------- */
.ico--inline { width: var(--c-icon-inline); height: var(--c-icon-inline); }
.ico--btn    { width: var(--c-icon-btn);    height: var(--c-icon-btn);    }
.ico--nav    { width: var(--c-icon-nav);    height: var(--c-icon-nav);    }
.ico--table  { width: var(--c-icon-table);  height: var(--c-icon-table);  }
.ico--card   { width: var(--c-icon-card);   height: var(--c-icon-card);   }
.ico--empty  { width: var(--c-icon-empty);  height: var(--c-icon-empty);  }

/* ---------- color roles (when you want to color the icon directly) ---------- */
.ico--muted   { color: var(--s-icon-muted);   }
.ico--brand   { color: var(--s-icon-brand);   }
.ico--success { color: var(--s-icon-success); }
.ico--warning { color: var(--s-icon-warning); }
.ico--danger  { color: var(--s-icon-danger);  }
.ico--info    { color: var(--s-icon-info);    }
.ico--on-brand{ color: var(--s-icon-on-brand);}

/* =====================================================================
   MOTION LAYER · token-driven icon animations
   All speeds come from --g-icon-dur* and easings from --g-icon-ease*, so a
   single token change re-times every animated icon. Geometry is never touched;
   only transforms / opacity / stroke-dash animate (GPU-friendly).

   Two ways to animate:
     1. Continuous loop  — add a class, e.g. <svg class="ico ico--spin">.
     2. Hover trigger    — wrap with .ico-hover and add .ico-hover--<name>;
        the icon animates once on hover (great for buttons / nav / cards).
   Override speed per-instance with a local token, e.g.
        <svg class="ico ico--spin" style="--g-icon-dur:.5s">.
   ===================================================================== */

.ico { transform-origin: 50% 50%; }

/* ---------- continuous loops ---------- */
.ico--spin   { animation: ico-spin   var(--g-icon-dur)      var(--g-icon-ease-spin) infinite; }
.ico--spin-slow { animation: ico-spin var(--g-icon-dur-slow) var(--g-icon-ease-spin) infinite; }
.ico--pulse  { animation: ico-pulse  var(--g-icon-dur-slow) var(--g-icon-ease)      infinite; }
.ico--ping   { animation: ico-ping   var(--g-icon-dur-slow) var(--g-icon-ease)      infinite; }
.ico--bounce { animation: ico-bounce var(--g-icon-dur)      var(--g-icon-ease)      infinite; }
.ico--beat   { animation: ico-beat   var(--g-icon-dur-slow) var(--g-icon-ease)      infinite; }
.ico--wobble { animation: ico-wobble var(--g-icon-dur)      var(--g-icon-ease)      infinite; }
.ico--shake  { animation: ico-shake  var(--g-icon-dur)      var(--g-icon-ease)      infinite; }
.ico--float  { animation: ico-float  var(--g-icon-dur-slow) var(--g-icon-ease)      infinite; }
.ico--swing  { animation: ico-swing  var(--g-icon-dur-slow) var(--g-icon-ease)      infinite; transform-origin: 50% 8%; }

@keyframes ico-spin   { to { transform: rotate(360deg); } }
@keyframes ico-pulse  { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
@keyframes ico-ping   { 0% { transform: scale(1); opacity: 1; } 70%,100% { transform: scale(1.6); opacity: 0; } }
@keyframes ico-bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-22%); } }
@keyframes ico-beat   { 0%,100% { transform: scale(1); } 30% { transform: scale(1.22); } 60% { transform: scale(.95); } }
@keyframes ico-wobble { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-9deg); } 75% { transform: rotate(9deg); } }
@keyframes ico-shake  { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-2px); } 40% { transform: translateX(2px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
@keyframes ico-float  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12%); } }
@keyframes ico-swing  { 0%,100% { transform: rotate(0); } 25% { transform: rotate(12deg); } 75% { transform: rotate(-12deg); } }

/* ---------- one-shot reveal: stroke "draws itself in" ---------- */
/* The <use> path inherits these; works on any sprite icon. */
.ico--draw use, .ico--draw path, .ico--draw circle, .ico--draw rect,
.ico--draw line, .ico--draw polyline, .ico--draw polygon {
  stroke-dasharray: 64;
  stroke-dashoffset: 64;
  animation: ico-draw var(--g-icon-dur-slow) var(--g-icon-ease) forwards;
}
@keyframes ico-draw { to { stroke-dashoffset: 0; } }

/* ---------- hover-triggered micro-interactions ---------- */
/* Put .ico-hover on the interactive parent (button / link / cell); the icon
   plays its animation only while hovered, then settles. */
.ico-hover .ico { transition: transform var(--g-icon-dur-fast) var(--g-icon-ease); }
.ico-hover.ico-hover--grow:hover    .ico { transform: scale(1.18); }
.ico-hover.ico-hover--shrink:hover  .ico { transform: scale(.85); }
.ico-hover.ico-hover--rotate:hover  .ico { transform: rotate(90deg); }
.ico-hover.ico-hover--spin:hover    .ico { transform: rotate(360deg); }
.ico-hover.ico-hover--up:hover      .ico { transform: translateY(-3px); }
.ico-hover.ico-hover--right:hover   .ico { transform: translateX(3px); }
.ico-hover.ico-hover--pop:hover     .ico { transform: scale(1.2); transition-timing-function: var(--g-icon-ease-bounce); }
.ico-hover.ico-hover--wobble:hover  .ico { animation: ico-wobble var(--g-icon-dur) var(--g-icon-ease); }
.ico-hover.ico-hover--beat:hover    .ico { animation: ico-beat   var(--g-icon-dur) var(--g-icon-ease); }

/* ---------- accessibility: honor reduced-motion ---------- */
@media (prefers-reduced-motion: reduce) {
  .ico--spin, .ico--spin-slow, .ico--pulse, .ico--ping, .ico--bounce,
  .ico--beat, .ico--wobble, .ico--shake, .ico--float, .ico--swing,
  .ico--draw use, .ico--draw path, .ico--draw circle, .ico--draw rect,
  .ico--draw line, .ico--draw polyline, .ico--draw polygon,
  .ico-hover .ico {
    animation: none !important;
    transition: none !important;
    stroke-dashoffset: 0 !important;
  }
}

/* =========================================================================
   GENIUS DESIGN LAYOUT · layout-kit.css
   Token-driven layout layer. Companion to genius-design-tokens (tokens.css).
   Consumes --g-sp-* (8pt spacing), --g-bp-* (breakpoints), semantic/component
   color tokens. Sets NO brand color of its own — theming stays centralized.
   Import AFTER tokens.css.
   ========================================================================= */

/* ---- Layout-token layer (thin, references globals) ---- */
:root{
  /* container sizing — scenario-tiered, FLUID: grow with viewport up to a cap,
     so wide / ultrawide screens actually use the space instead of freezing the
     width and piling on side margins. min(vw, max) > a flat max-width. */
  --c-container-max:  min(92vw, 1280px);   /* C-side default                       */
  --c-container-wide: min(95vw, 2000px);   /* B-side / dashboard, near-full-bleed  */
  --c-container-read: 720px;    /* docs / article reading column (45-75ch) — stays narrow on purpose */
  /* fluid horizontal padding: grows with viewport, clamped for safety  */
  --c-container-pad:  clamp(var(--g-sp-4), 4vw, var(--g-sp-8));
  /* grid */
  --c-grid-cols: 12;
  --c-grid-gutter: clamp(var(--g-sp-3), 2vw, var(--g-sp-6));
  /* regions (app shell) */
  --c-sidebar-w: clamp(200px, 18vw, 260px);
  --c-topbar-h: 56px;
  /* section rhythm (C-side) — fluid vertical rhythm */
  --c-section-pad-y: clamp(var(--g-sp-8), 8vw, var(--g-sp-16));
  --c-card-pad: var(--g-sp-6);
  /* narrow container cap (between read and max) — layout structural knob */
  --c-container-narrow: min(92vw, 880px);
  /* card icon box — references the radius/spacing scale, no magic number */
  --c-card-icon-size: var(--g-sp-8);   /* 32px, snaps to the 8pt scale */
}

/* Standalone-defaults fallback (kit still works if tokens.css is absent).

   IMPORTANT — do NOT write self-referential fallbacks like
   `--g-sp-2: var(--g-sp-2, 8px);`. A custom property that references itself is a
   CYCLE: per CSS spec the whole declaration becomes the guaranteed-invalid
   (empty) value, and once a name is cycle-poisoned no later same-name
   declaration can revive it. Custom properties are NOT resolved by import order,
   so a self-reference can never "let tokens win" — it just breaks the value.

   Correct mechanism: put the plain literal defaults in a LOW-priority cascade
   layer. Cascade-layer precedence is independent of source/import order, so
   tokens.css (unlayered, therefore higher priority than any layer) ALWAYS wins
   when present, and these defaults only apply when tokens.css is absent. No
   self-reference, no cycle, no poisoning. The bp defaults are values only for
   documentation — media queries below use literal px (var() is illegal in a
   media query condition). */
@layer gdl-fallback{
  :root{
    --g-sp-1: 4px;
    --g-sp-2: 8px;
    --g-sp-3: 12px;
    --g-sp-4: 16px;
    --g-sp-6: 24px;
    --g-sp-8: 32px;
    --g-sp-16: 64px;
    --g-bp-sm: 640px;
    --g-bp-md: 768px;
    --g-bp-lg: 1024px;
    --g-bp-xl: 1280px;
    /* structural primitives the layout references directly (spacing/radius/
       type-weight/motion/z) — standalone defaults only; tokens.css wins when
       present because it is unlayered (higher priority than any cascade layer). */
    --g-r-lg: 12px;
    --g-fw-semibold: 600;
    --g-fs-sm: 13px;
    --g-dur-base: 160ms;
    --g-ease: cubic-bezier(.4,0,.2,1);
    --g-z-dropdown: 1000;
  }
}

*,*::before,*::after{ box-sizing:border-box; }

/* ---- Container (scenario-tiered) ---- */
.container{
  width:100%;
  max-width:var(--c-container-max);
  margin-inline:auto;
  padding-inline:var(--c-container-pad);
}
.container--wide{   max-width:var(--c-container-wide); }   /* B-side / dashboard */
.container--narrow{ max-width:var(--c-container-narrow); }
.container--read{   max-width:var(--c-container-read); }   /* docs / article */
.reading{ max-width:var(--c-container-read); margin-inline:auto; }

/* ---- 12-column grid (MOBILE-FIRST) ----
   Base = 1 column: every child spans the full row on phones. The 12-col track
   grid and the .col-* spans are switched ON only from md (>=768) upward via
   min-width queries in the adaptive section below. This is true mobile-first:
   the grid re-columns UP as the viewport grows, and there is NO width range
   where a hard 12-col track squeezes content into unusable slivers.
   (The previous version defined a hard 12-col base and only collapsed to 1 col
   at <640px, so 640-1279px rendered a rigid 12-col grid — the main cause of
   "columns crushed / cards too narrow" on tablets and mid-width windows.) */
.grid{
  display:grid;
  grid-template-columns:1fr;          /* mobile base: single column        */
  gap:var(--c-grid-gutter);
}
.grid > [class*="col-"]{ grid-column:1 / -1; }   /* full row until md up-tier */

/* ---- Auto card grid (list-feed archetype) ---- */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:var(--c-grid-gutter);
}

/* ---- KPI row (self-adapting; independent of the 12-col grid) ----
   Mobile-first: cards auto-fit and never get narrower than ~180px, so a KPI row
   reflows 1->2->3->4->6-up automatically as the viewport grows, with no manual
   breakpoints and no risk of a rigid track crushing the cards. */
.kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:var(--c-grid-gutter);
}

/* ---- Flex helpers ---- */
.stack{ display:flex; flex-direction:column; gap:var(--g-sp-4); }
.row{ display:flex; align-items:center; gap:var(--g-sp-3); }
.row--between{ display:flex; align-items:center; justify-content:space-between; gap:var(--g-sp-4); }
.wrap{ flex-wrap:wrap; }

/* =========================================================================
   ARCHETYPE SKELETONS
   ========================================================================= */

/* 0. Content Page (DEFAULT for a single B-side page) -----------------
   A standalone page: page header + optional toolbar + content grid.
   NO sidebar, NO persistent topbar, NO view router. This is what you build
   for "a dashboard page", "后台管理页", a single report/form/settings screen.
   It fills its container and can be dropped into an App Shell later unchanged. */
.page{ min-height:100vh; }
.page__header{                 /* title bar: breadcrumb / title / primary action */
  display:flex; align-items:center; justify-content:space-between;
  gap:var(--g-sp-4); flex-wrap:wrap;
  padding-block:var(--g-sp-6);
}
.page__title{ margin:0; font-weight:var(--g-fw-semibold); }
.page__toolbar{                /* optional filter / action row */
  display:flex; align-items:center; gap:var(--g-sp-3); flex-wrap:wrap;
  margin-bottom:var(--g-sp-6);
}
.page__body{ display:block; }
/* optional page + aside split (content + inspector/summary), page-level only.
   Base = stacked (1 col); the md-up query restores the content|aside split. */
.page--with-aside .page__body{
  display:grid; grid-template-columns:1fr;
  gap:var(--c-grid-gutter); align-items:start;
}

/* A. App Shell (full app / site scope ONLY — opt-in) -----------------
   Use ONLY for a whole multi-page application/site with persistent navigation.
   Do NOT use for a single page — use .page (Content Page) above instead.
   The content region typically hosts a .page.
   NOTE: the responsive .app-shell grid (stacked base -> sidebar+topbar from md)
   is defined in the ADAPTIVE section below; here we set only the inner regions. */
.app-shell__sidebar{ grid-area:sidebar; padding:var(--g-sp-4); }
.app-shell__topbar{ grid-area:topbar; display:flex; align-items:center; gap:var(--g-sp-4); padding-inline:var(--g-sp-6); }
.app-shell__content{ grid-area:content; padding:var(--g-sp-6); overflow:auto; }

/* B. Two-pane / List-Detail (B-side, form) --------------------------
   Base = stacked (list over detail); md-up query restores side-by-side. */
.two-pane{ display:grid; grid-template-columns:1fr; gap:var(--c-grid-gutter); min-height:100%; }
.two-pane__list{ padding:var(--g-sp-4); }
.two-pane__detail{ padding:var(--g-sp-6); }

/* C. Stacked Sections (C-side, marketing) --------------------------- */
.section{ padding-block:var(--c-section-pad-y); }
.section--tight{ padding-block:var(--g-sp-8); }
.section__head{ text-align:center; max-width:760px; margin-inline:auto; margin-bottom:var(--g-sp-8); }

/* D. Comparison Grid (C-side, pricing) ------------------------------
   Base = 1 col; sm->2, md->3 handled in the ADAPTIVE section below. */
.compare{ display:grid; grid-template-columns:1fr; gap:var(--c-grid-gutter); align-items:stretch; }
.compare__col{ padding:var(--c-card-pad); display:flex; flex-direction:column; gap:var(--g-sp-4); }

/* E. Doc Layout (content, docs) -------------------------------------
   Base = 1 col (nav hidden as drawer); md->2col, xl->3col with TOC below. */
.doc{ display:grid; grid-template-columns:1fr; gap:var(--c-grid-gutter); }
.doc__nav{ padding:var(--g-sp-4); display:none; }   /* base: nav is a drawer   */
.doc__main{ max-width:var(--c-container-read); }
.doc__toc{ padding:var(--g-sp-4); font-size:var(--g-fs-sm); display:none; } /* base/lg: TOC off */

/* F. Card (icon + title same line — project rule) ------------------- */
.card{
  padding:var(--c-card-pad);
  border-radius:var(--c-card-radius,var(--g-r-lg));   /* --c-card-radius from tokens; --g-r-lg structural */
  background:var(--s-surface);                         /* semantic role — no hardcoded color (theming/dark stay free) */
  border:1px solid var(--s-border);
  display:flex; flex-direction:column; gap:var(--g-sp-3);
}
.card__head{ display:flex; align-items:center; gap:var(--g-sp-3); }
.card__icon{ width:var(--c-card-icon-size); height:var(--c-card-icon-size); flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; }
.card__title{ font-weight:var(--g-fw-semibold); margin:0; }

/* =========================================================================
   ADAPTIVE STRATEGY — MOBILE-FIRST device-tier ladder.
   Base (above) = 1 col. Here we ENABLE the 12-col grid and col-* spans UPWARD
   via min-width queries, so the grid re-columns as the viewport grows and there
   is no width range that falls back to a rigid, content-crushing 12-col track.
   Reflow (re-column), not scale. Breakpoints track --g-bp-* values.

   Device tiers:
     xs  < 640     phone (portrait)       -> 1 col (base, no query)
     sm  640-767   phone (landscape)/phab -> 2-col grid
     md  768-1023  tablet                 -> full 12-col grid ON, col-* honored
     lg  1024-1279 laptop                 -> full grid, all regions
     xl  >= 1280   desktop                -> full grid, wide container for B-side
     xxl >= 1680   27"/ultrawide          -> UP-tier reflow (grid gains columns)
   ========================================================================= */

/* sm (>= 640) — phone landscape / phablet: a light 2-col grid so paired
   content sits side by side instead of one giant stack. */
@media (min-width:640px){            /* >= --g-bp-sm */
  .grid{ grid-template-columns:repeat(2,1fr); }
  .grid > [class*="col-"]{ grid-column:span 1; }   /* each item = one of 2 cols */
  .compare{ grid-template-columns:repeat(2,1fr); }
}

/* md (>= 768) — tablet & up: turn ON the real 12-col track and honor col-* spans.
   Below this width the grid is 1-2 col and col-* are neutralized (full/half row),
   which is exactly the intended reflow. */
@media (min-width:768px){            /* >= --g-bp-md */
  .grid{ grid-template-columns:repeat(var(--c-grid-cols),1fr); }
  .col-1{grid-column:span 1}.col-2{grid-column:span 2}.col-3{grid-column:span 3}
  .col-4{grid-column:span 4}.col-5{grid-column:span 5}.col-6{grid-column:span 6}
  .col-7{grid-column:span 7}.col-8{grid-column:span 8}.col-9{grid-column:span 9}
  .col-10{grid-column:span 10}.col-11{grid-column:span 11}.col-12{grid-column:span 12}
  .doc{ grid-template-columns:180px minmax(0,1fr); }   /* 2-col doc on tablet   */
  .doc__nav{ display:block; }                           /* nav visible from md   */
  .compare{ grid-template-columns:repeat(3,1fr); }
}

/* lg (>= 1024) — laptop: full doc chrome (nav + content), TOC still off */
@media (min-width:1024px){           /* >= --g-bp-lg */
  .doc{ grid-template-columns:220px minmax(0,1fr); }
}

/* xl (>= 1280) — desktop: restore the 3-col doc layout with TOC */
@media (min-width:1280px){           /* >= --g-bp-xl */
  .doc{ grid-template-columns:240px minmax(0,1fr) 200px; }
  .doc__toc{ display:block; }
}

/* xxl (>= 1680) — wide / 27" desktop: UP-tier reflow. A wider container alone is
   NOT a perceptible change; the GRID must gain columns so extra width becomes
   more content, not just bigger margins. */
@media (min-width:1680px){           /* >= --g-bp-xxl */
  .grid > .col-3{ grid-column:span 2; }            /* KPI-style row 4 -> 6 up */
  .grid > .col-8{ grid-column:span 9; }            /* trend chart wider       */
  .grid > .col-4{ grid-column:span 3; }
  .card-grid{ grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); }
  .doc{ grid-template-columns:240px minmax(0,1fr) 240px; } /* wider rails      */
}

/* Region stacking for narrow widths (app-shell / two-pane) — mobile-first base
   is stacked; these restore multi-region layout from md up. */
.app-shell{                          /* base (xs/sm): stacked, drawer sidebar */
  display:grid;
  grid-template-columns:1fr;
  grid-template-rows:var(--c-topbar-h) 1fr;
  grid-template-areas:"topbar" "content";
  min-height:100vh;
}
.app-shell__sidebar{ position:fixed; inset:0 auto 0 0; width:var(--c-sidebar-w);
  transform:translateX(-100%); transition:transform var(--g-dur-base) var(--g-ease); z-index:var(--g-z-dropdown); }
.app-shell.is-open .app-shell__sidebar{ transform:none; }
.two-pane{ grid-template-columns:1fr; }   /* base: stacked list/detail */
.page--with-aside .page__body{ grid-template-columns:1fr; }  /* base: aside below */

@media (min-width:768px){            /* >= --g-bp-md : restore multi-region */
  .app-shell{
    grid-template-columns:var(--c-sidebar-w) 1fr;
    grid-template-rows:var(--c-topbar-h) 1fr;
    grid-template-areas:"sidebar topbar" "sidebar content";
  }
  .app-shell__sidebar{ position:static; transform:none; width:auto; z-index:auto; }
  .two-pane{ grid-template-columns:minmax(260px,1fr) 2fr; }
  .page--with-aside .page__body{
    grid-template-columns:minmax(0,1fr) clamp(260px,26vw,360px);
  }
}


/* ============================================================
   English Sentence Structure — topic page
   References tokens only. iPad-first, C-side teaching.
   ============================================================ */
html, body { background: var(--s-bg); margin: 0; }
body { font-family: var(--g-font); color: var(--s-text); min-height: 100dvh; -webkit-font-smoothing: antialiased; }
.app { min-height: 100dvh; display: flex; flex-direction: column; }
/* unified card grid metrics — every 平铺卡片区 shares these so列宽一致、边缘对齐 */
:root { --card-min: 360px; --card-gap: var(--g-sp-4); --c-container-max: min(94vw, 1240px); }
.wrap { width: 100%; max-width: var(--c-container-max, min(94vw, 1200px)); margin-inline: auto; padding-inline: var(--c-container-pad, clamp(var(--g-sp-4), 4vw, var(--g-sp-8))); }

/* header */
.appbar { position: sticky; top: 0; z-index: var(--g-z-sticky); background: color-mix(in srgb, var(--s-bg) 82%, transparent); backdrop-filter: saturate(150%) blur(12px); border-bottom: 1px solid var(--s-border); }
.appbar__inner { display: flex; align-items: center; gap: var(--g-sp-4); padding-block: var(--g-sp-3); }
.brand { display: flex; align-items: center; gap: var(--g-sp-3); min-width: 0; }
.brand__mark { width: 44px; height: 44px; border-radius: var(--g-r-lg); display: grid; place-items: center; flex: none; background: var(--s-brand); color: var(--s-on-brand); box-shadow: var(--s-shadow-sm); }
.brand__title { font-size: var(--s-fs-body-lg); font-weight: var(--g-fw-bold); line-height: 1.2; }
.brand__sub { font-size: var(--s-fs-caption); color: var(--s-text-secondary); }
.appbar__spacer { flex: 1; }
.iconbtn { width: 42px; height: 42px; border-radius: var(--g-r-md); border: 1px solid var(--s-border); background: var(--s-surface); color: var(--s-text-secondary); display: grid; place-items: center; cursor: pointer; transition: all var(--g-dur-fast) var(--g-ease); }
.iconbtn:hover { background: var(--s-surface-hover); color: var(--s-text); }

/* rate control (语速) */
.rate-ctrl { display: flex; align-items: center; gap: var(--g-sp-2); color: var(--s-text-secondary); }
.rate-seg { display: flex; padding: 3px; background: var(--s-surface-sunken); border: 1px solid var(--s-border); border-radius: var(--g-r-full); }
.rate-opt { appearance: none; border: 0; background: transparent; cursor: pointer; font: inherit; font-size: var(--s-fs-caption); font-weight: var(--g-fw-medium); color: var(--s-text-secondary); padding: var(--g-sp-1) var(--g-sp-3); border-radius: var(--g-r-full); min-height: 34px; transition: all var(--g-dur-fast) var(--g-ease); }
.rate-opt--on { background: var(--s-brand); color: var(--s-on-brand); box-shadow: var(--s-shadow-sm); }
@media (max-width: 560px){ .rate-ctrl > .ico { display: none; } .rate-opt { padding-inline: var(--g-sp-2); } }

/* hero */
.hero { padding-block: var(--g-sp-10) var(--g-sp-6); text-align: center; }
.hero h1 { margin: 0; font-size: var(--s-fs-display); font-weight: var(--g-fw-bold); letter-spacing: var(--g-ls-tight); }
.hero p { margin: var(--g-sp-3) auto 0; max-width: 640px; color: var(--s-text-secondary); font-size: var(--s-fs-body-lg); line-height: var(--s-lh-body); }
.hero__skeleton { display: flex; justify-content: center; flex-wrap: wrap; gap: var(--g-sp-2); margin-top: var(--g-sp-6); font-size: var(--s-fs-h2); font-weight: var(--g-fw-bold); }
.hero__skeleton .tk { padding: var(--g-sp-1) var(--g-sp-3); border-radius: var(--g-r-md); background: var(--s-surface); border: 1px solid var(--s-border); }

/* section */
.sec { padding-block: var(--g-sp-8); border-top: 1px solid var(--s-border); }
.sec__head { display: flex; align-items: center; gap: var(--g-sp-3); margin-bottom: var(--g-sp-5); }
.sec__num { width: 40px; height: 40px; flex: none; border-radius: var(--g-r-full); display: grid; place-items: center; background: var(--s-brand); color: var(--s-on-brand); font-weight: var(--g-fw-bold); }
.sec__title { font-size: var(--s-fs-h2); font-weight: var(--g-fw-bold); }
.sec__sub { font-size: var(--s-fs-body); color: var(--s-text-secondary); margin-top: 2px; }

/* color tokens */
.tk--subj { color: var(--g-cyan-700); font-weight: var(--g-fw-semibold); }
.tk--verb { color: var(--g-red-700); font-weight: var(--g-fw-bold); }
.tk--obj  { color: var(--g-green-700); font-weight: var(--g-fw-medium); }
.tk--other{ color: var(--s-text-muted); }
[data-theme="dark"] .tk--subj { color: #67e8f9; }
[data-theme="dark"] .tk--verb { color: #fca5a5; }
[data-theme="dark"] .tk--obj  { color: #86efac; }

/* IPA phonetic line under a sentence */
.ipa-line { display: flex; align-items: center; gap: var(--g-sp-1); margin-top: var(--g-sp-2); font-family: var(--g-font-mono); font-size: var(--s-fs-caption); color: var(--s-text-secondary); line-height: 1.5; word-break: break-word; }
.ipa-line .ico { color: var(--s-brand); flex: none; opacity: .7; }
.agree-sent .ipa-line { margin-top: var(--g-sp-1); flex-basis: 100%; }

/* parts grid */
.parts-grid { display: grid; gap: var(--card-gap); grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min)), 1fr)); align-items: stretch; }
.part-card { background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-xl); padding: var(--g-sp-5); border-top: 4px solid var(--s-border); }
.part-card--subj { border-top-color: var(--g-cyan-500); }
.part-card--verb { border-top-color: var(--g-red-500); }
.part-card--obj  { border-top-color: var(--g-green-500); }
.part-card--other{ border-top-color: var(--g-neutral-400); }
.part-card__head { display: flex; align-items: baseline; gap: var(--g-sp-2); }
.part-card__zh { font-size: var(--s-fs-h3); font-weight: var(--g-fw-bold); }
.part-card__en { font-size: var(--s-fs-caption); color: var(--s-text-secondary); font-family: var(--g-font-mono); }
.part-card__role { display: inline-block; margin-top: var(--g-sp-2); font-size: var(--s-fs-caption); font-weight: var(--g-fw-semibold); color: var(--s-brand); background: var(--s-brand-subtle); padding: 2px var(--g-sp-2); border-radius: var(--g-r-full); }
.part-card__desc { margin: var(--g-sp-3) 0 0; font-size: var(--s-fs-body); line-height: var(--s-lh-body); color: var(--s-text-secondary); }
.part-card__ex { margin-top: var(--g-sp-3); display: flex; flex-wrap: wrap; gap: var(--g-sp-2); }
.part-chip { font-size: var(--s-fs-caption); background: var(--s-surface-sunken); border: 1px solid var(--s-border); border-radius: var(--g-r-sm); padding: 2px var(--g-sp-2); }

/* patterns */
.pat-list { display: flex; flex-direction: column; gap: var(--g-sp-4); }
.pat-card { background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-xl); padding: var(--g-sp-5); }
.pat-card__top { display: flex; align-items: center; gap: var(--g-sp-3); flex-wrap: wrap; }
.pat-code { font-family: var(--g-font-mono); font-weight: var(--g-fw-bold); font-size: var(--s-fs-body-lg); color: var(--s-on-brand); background: var(--s-brand); padding: var(--g-sp-1) var(--g-sp-3); border-radius: var(--g-r-md); }
.pat-title { font-size: var(--s-fs-body-lg); font-weight: var(--g-fw-bold); }
.pat-note { font-size: var(--s-fs-caption); color: var(--s-text-secondary); flex: 1; min-width: 140px; }
.pat-formula { font-family: var(--g-font-mono); font-size: var(--s-fs-caption); color: var(--s-brand); background: var(--s-brand-subtle); border: 1px dashed color-mix(in srgb, var(--s-brand) 30%, transparent); border-radius: var(--g-r-sm); padding: var(--g-sp-1) var(--g-sp-2); margin-top: var(--g-sp-3); display: inline-block; }
.pat-sentence { font-size: var(--s-fs-h3); margin-top: var(--g-sp-3); display: flex; align-items: center; gap: var(--g-sp-3); flex-wrap: wrap; }
.pat-sentence__zh { font-size: var(--s-fs-body); color: var(--s-text-secondary); margin-top: var(--g-sp-1); }
.pat-explain { margin-top: var(--g-sp-3); padding: var(--g-sp-3); background: var(--s-surface-sunken); border-left: 3px solid var(--s-brand); border-radius: var(--g-r-md); font-size: var(--s-fs-caption); color: var(--s-text-secondary); line-height: var(--s-lh-body); }

/* speak button */
.speak { width: 38px; height: 38px; flex: none; border-radius: var(--g-r-full); cursor: pointer; border: 1px solid color-mix(in srgb, var(--s-brand) 30%, transparent); background: var(--s-brand-subtle); color: var(--s-brand); display: grid; place-items: center; transition: all var(--g-dur-fast) var(--g-ease); }
.speak:hover { background: var(--s-brand); color: var(--s-on-brand); }
.speak.playing { animation: pulse 1s var(--g-ease) infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

/* compare */
.cmp-list { display: grid; gap: var(--card-gap); grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min)), 1fr)); align-items: stretch; }
.cmp-card { background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-xl); padding: var(--g-sp-5); }
.cmp-row { display: flex; align-items: center; gap: var(--g-sp-2); font-size: var(--s-fs-body); }
.cmp-tag { font-size: var(--s-fs-caption); font-weight: var(--g-fw-bold); border-radius: var(--g-r-sm); padding: 1px var(--g-sp-2); flex: none; }
.cmp-tag--cn { color: var(--s-text-secondary); background: var(--s-surface-sunken); }
.cmp-tag--en { color: var(--s-on-brand); background: var(--s-brand); }
.cmp-arrow { text-align: center; color: var(--s-text-muted); margin: var(--g-sp-2) 0; }
.cmp-tip { margin-top: var(--g-sp-3); font-size: var(--s-fs-caption); color: var(--s-text-secondary); background: var(--s-brand-subtle); border-radius: var(--g-r-md); padding: var(--g-sp-2) var(--g-sp-3); }

/* builder */
.build-card { background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-xl); padding: clamp(var(--g-sp-5), 4vw, var(--g-sp-8)); }
.build-progress { display: flex; align-items: center; justify-content: space-between; color: var(--s-text-secondary); font-size: var(--s-fs-caption); margin-bottom: var(--g-sp-3); }
.build-target { font-size: var(--s-fs-body-lg); font-weight: var(--g-fw-medium); text-align: center; margin-bottom: var(--g-sp-5); }
.build-slots { display: flex; flex-wrap: wrap; gap: var(--g-sp-2); justify-content: center; min-height: 56px; padding: var(--g-sp-3); border: 2px dashed var(--s-border); border-radius: var(--g-r-lg); margin-bottom: var(--g-sp-5); align-items: center; }
.build-slots:empty::before { content: "点下面的词块,按正确顺序组句"; color: var(--s-text-muted); font-size: var(--s-fs-caption); }
.build-bank { display: flex; flex-wrap: wrap; gap: var(--g-sp-2); justify-content: center; margin-bottom: var(--g-sp-5); }
.word-block { appearance: none; font: inherit; cursor: pointer; min-height: 44px; font-size: var(--s-fs-body-lg); font-weight: var(--g-fw-medium); padding: var(--g-sp-2) var(--g-sp-4); border-radius: var(--g-r-md); border: 1.5px solid var(--s-border); background: var(--s-surface); color: var(--s-text); transition: all var(--g-dur-fast) var(--g-ease); }
.word-block:hover:not(:disabled) { border-color: var(--s-brand); background: var(--s-brand-subtle); }
.word-block--placed { background: var(--s-brand-subtle); }
.word-block:disabled { opacity: .35; cursor: default; }
.build-slot { min-height: 44px; }
.build-feedback { text-align: center; font-weight: var(--g-fw-semibold); margin-bottom: var(--g-sp-4); min-height: 24px; }
.build-feedback--ok { color: var(--g-green-700); }
.build-feedback--no { color: var(--g-red-700); }
.build-actions { display: flex; gap: var(--g-sp-3); justify-content: center; flex-wrap: wrap; }
.btn { appearance: none; font: inherit; cursor: pointer; min-height: 44px; display: inline-flex; align-items: center; gap: var(--g-sp-2); padding: var(--g-sp-2) var(--g-sp-5); border-radius: var(--g-r-md); border: 1px solid var(--s-border); background: var(--s-surface); color: var(--s-text); font-weight: var(--g-fw-medium); transition: all var(--g-dur-fast) var(--g-ease); }
.btn:hover { background: var(--s-surface-hover); }
.btn--primary { background: var(--s-brand); color: var(--s-on-brand); border-color: transparent; }
.btn--primary:hover { background: var(--s-brand-hover); }

/* legend (shared) */
.sent-legend { display: flex; flex-wrap: wrap; gap: var(--g-sp-3); align-items: center; background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-lg); padding: var(--g-sp-3) var(--g-sp-4); margin-bottom: var(--g-sp-5); font-size: var(--s-fs-caption); }
.sent-legend__label { color: var(--s-text-secondary); display: flex; align-items: center; gap: var(--g-sp-1); font-weight: var(--g-fw-medium); }
.sent-legend__item { display: inline-flex; align-items: center; gap: var(--g-sp-1); }
.sent-legend__dot { width: 10px; height: 10px; border-radius: 3px; }
.sent-legend__dot--subj { background: var(--g-cyan-500); }
.sent-legend__dot--verb { background: var(--g-red-500); }
.sent-legend__dot--obj { background: var(--g-green-500); }
.sent-legend__dot--other { background: var(--g-neutral-400); }

/* ---- 火眼金睛 (对比纠错) ---- */
.fix-list { display: grid; gap: var(--card-gap); grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min)), 1fr)); align-items: stretch; }
.fix-card { background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-xl); padding: var(--g-sp-4); }
.fix-wrong { display: flex; align-items: center; gap: var(--g-sp-2); color: var(--g-red-700); font-size: var(--s-fs-body-lg); text-decoration: line-through; text-decoration-color: color-mix(in srgb, var(--g-red-500) 60%, transparent); }
.fix-wrong .ico { flex: none; text-decoration: none; }
.fix-reveal { margin-top: var(--g-sp-3); }
.fix-right { display: flex; align-items: center; gap: var(--g-sp-2); margin-top: var(--g-sp-3); font-size: var(--s-fs-body-lg); color: var(--g-green-700); }
.fix-right .ico { color: var(--g-green-500); flex: none; }
.fix-why { margin-top: var(--g-sp-2); font-size: var(--s-fs-caption); color: var(--s-text-secondary); background: var(--s-brand-subtle); border-radius: var(--g-r-md); padding: var(--g-sp-2) var(--g-sp-3); line-height: var(--s-lh-body); }

/* ---- 造我自己的句子 (情境个人化) ---- */
.my-card { background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-xl); padding: clamp(var(--g-sp-5), 4vw, var(--g-sp-8)); }
.my-progress { display: flex; align-items: center; justify-content: space-between; color: var(--s-text-secondary); font-size: var(--s-fs-caption); margin-bottom: var(--g-sp-4); flex-wrap: wrap; gap: var(--g-sp-2); }
.my-template { text-align: center; font-size: var(--s-fs-h2); font-weight: var(--g-fw-bold); display: flex; justify-content: center; flex-wrap: wrap; gap: var(--g-sp-2); margin-bottom: var(--g-sp-5); }
.my-blank { min-width: 60px; padding: 0 var(--g-sp-2); border-bottom: 3px dashed var(--s-brand); color: var(--s-text-muted); }
.my-blank--filled { border-bottom-style: solid; }
.my-options { display: flex; flex-wrap: wrap; gap: var(--g-sp-2); justify-content: center; margin-bottom: var(--g-sp-5); }
.my-result { text-align: center; display: flex; align-items: center; justify-content: center; gap: var(--g-sp-2); flex-wrap: wrap; font-size: var(--s-fs-body); color: var(--s-text-secondary); background: var(--s-surface-sunken); border-radius: var(--g-r-lg); padding: var(--g-sp-3); }
.my-result .ico { color: var(--g-green-500); }
.my-result__sent { font-size: var(--s-fs-body-lg); font-weight: var(--g-fw-medium); }
.my-hint { text-align: center; color: var(--s-text-muted); font-size: var(--s-fs-caption); }

/* drag hover for builder slots */
.build-slots.dragover { border-color: var(--s-brand); background: var(--s-brand-subtle); }
.word-block[draggable="true"] { cursor: grab; }
.word-block[draggable="true"]:active { cursor: grabbing; }

/* footer */
.foot { margin-top: auto; border-top: 1px solid var(--s-border); padding-block: var(--g-sp-5); color: var(--s-text-muted); font-size: var(--s-fs-caption); text-align: center; }

/* ---- Agreement (人称/单复数) ---- */
.agree-block { margin-top: var(--g-sp-6); }
.agree-block__title { font-size: var(--s-fs-body-lg); font-weight: var(--g-fw-semibold); margin-bottom: var(--g-sp-3); }
.agree-table { display: flex; flex-direction: column; gap: var(--g-sp-2); }
.agree-row { display: grid; grid-template-columns: minmax(120px,1.4fr) minmax(60px,.6fr) minmax(0,2fr); gap: var(--g-sp-3); align-items: center; background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-lg); padding: var(--g-sp-3) var(--g-sp-4); }
.agree-row--hot { border-color: color-mix(in srgb, var(--g-red-500) 45%, var(--s-border)); background: color-mix(in srgb, var(--g-red-100) 40%, var(--s-surface)); }
.agree-subj { font-weight: var(--g-fw-semibold); display: flex; flex-direction: column; }
.agree-subj__zh { font-size: var(--s-fs-caption); color: var(--s-text-secondary); font-weight: var(--g-fw-regular); }
.agree-verb { font-family: var(--g-font-mono); font-size: var(--s-fs-body-lg); }
.agree-sent { display: flex; align-items: center; gap: var(--g-sp-2); font-size: var(--s-fs-body); }
@media (max-width: 560px){ .agree-row { grid-template-columns: 1fr; gap: var(--g-sp-1); } }

/* plural */
.plural-grid { display: grid; gap: var(--card-gap); grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min)), 1fr)); align-items: stretch; }
.plural-card { background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-lg); padding: var(--g-sp-4); }
.plural-card__pair { display: flex; align-items: center; gap: var(--g-sp-2); font-size: var(--s-fs-body-lg); font-weight: var(--g-fw-medium); }
.plural-card__note { margin-top: var(--g-sp-2); font-size: var(--s-fs-caption); color: var(--s-text-secondary); }

/* ---- Tenses ---- */
.tense-grid { display: grid; gap: var(--card-gap); grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min)), 1fr)); align-items: stretch; }
.tense-card { background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-xl); padding: var(--g-sp-5); }
.tense-card__head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--g-sp-2); margin-bottom: var(--g-sp-3); }
.tense-name { font-size: var(--s-fs-body-lg); font-weight: var(--g-fw-bold); }
.tense-when { font-size: var(--s-fs-caption); color: var(--s-on-brand); background: var(--s-brand); padding: 1px var(--g-sp-2); border-radius: var(--g-r-full); }
.tense-sent { font-size: var(--s-fs-h3); display: flex; align-items: center; gap: var(--g-sp-2); flex-wrap: wrap; }
.tense-zh { font-size: var(--s-fs-caption); color: var(--s-text-secondary); margin-top: var(--g-sp-1); }
.tense-key { margin-top: var(--g-sp-3); font-size: var(--s-fs-caption); color: var(--s-brand); background: var(--s-brand-subtle); border-radius: var(--g-r-md); padding: var(--g-sp-2) var(--g-sp-3); display: flex; align-items: center; gap: var(--g-sp-1); font-family: var(--g-font-mono); }

.signal-block { margin-top: var(--g-sp-6); }
.signal-grid { display: grid; gap: var(--card-gap); grid-template-columns: repeat(auto-fit, minmax(min(100%, var(--card-min)), 1fr)); align-items: stretch; }
.signal-item { display: flex; align-items: center; gap: var(--g-sp-3); background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-md); padding: var(--g-sp-2) var(--g-sp-3); }
.signal-tense { font-size: var(--s-fs-caption); font-weight: var(--g-fw-bold); color: var(--s-brand); flex: none; }
.signal-words { font-family: var(--g-font-mono); font-size: var(--s-fs-caption); color: var(--s-text-secondary); }

/* ---- Grow ---- */
.grow-list { display: flex; flex-direction: column; gap: var(--g-sp-3); }
.grow-step { display: flex; align-items: flex-start; gap: var(--g-sp-3); background: var(--s-surface); border: 1px solid var(--s-border); border-radius: var(--g-r-lg); padding: var(--g-sp-4); }
.grow-step__idx { width: 30px; height: 30px; flex: none; border-radius: var(--g-r-full); display: grid; place-items: center; background: var(--s-brand-subtle); color: var(--s-brand); font-weight: var(--g-fw-bold); font-size: var(--s-fs-caption); }
.grow-step__body { min-width: 0; flex: 1; }
.grow-step__sent { font-size: var(--s-fs-body-lg); display: flex; align-items: center; gap: var(--g-sp-2); flex-wrap: wrap; }
.grow-step__zh { font-size: var(--s-fs-caption); color: var(--s-text-secondary); margin-top: 2px; }
.grow-step__add { margin-top: var(--g-sp-2); font-size: var(--s-fs-caption); color: var(--s-brand); display: inline-flex; align-items: center; gap: var(--g-sp-1); background: var(--s-brand-subtle); padding: 2px var(--g-sp-2); border-radius: var(--g-r-full); }


@media (max-width: 640px) {
  .brand__sub { display: none; }
  .hero h1 { font-size: var(--s-fs-h1); }
  .sec__title { font-size: var(--s-fs-h3); }
}

</style>

      // 1) config message
      ws.send(
        `X-Timestamp:${_dateStr()}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n`
        + `{"context":{"synthesis":{"audio":{"metadataoptions":{"sentenceBoundaryEnabled":"false","wordBoundaryEnabled":"false"},"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}`
      );
      // 2) SSML message
      ws.send(
        `X-RequestId:${reqId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${_dateStr()}Z\r\nPath:ssml\r\n\r\n`
        + _ssml(text)
      );
    };
    ws.onmessage = (ev) => {
      if (typeof ev.data === 'string') {
        if (ev.data.includes('Path:turn.end')) {
          clearTimeout(timer); try{ws.close();}catch(e){}
          if (!chunks.length) return reject(new Error('no audio'));
          const blob = new Blob(chunks, { type: 'audio/mpeg' });
          resolve(URL.createObjectURL(blob));
        }
      } else {
        // binary frame: 2-byte header length prefix, then "Path:audio\r\n\r\n" then mp3 bytes
        const buf = new Uint8Array(ev.data);
        const headerLen = (buf[0] << 8) | buf[1];
        const audio = buf.slice(2 + headerLen);
        if (audio.length) chunks.push(audio);
      }
    };
    ws.onerror = () => { clearTimeout(timer); reject(new Error('ws error')); };
    ws.onclose = (e) => { if (!chunks.length) { clearTimeout(timer); reject(new Error('closed')); } };
  });
}

function speak(text, btnEl){
  if (!text) return;
  if (btnEl) btnEl.classList.add('playing');
  const done = () => { if (btnEl) btnEl.classList.remove('playing'); };
  try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e){}
  if (!window.__ttsAudio) window.__ttsAudio = new Audio();
  const a = window.__ttsAudio;
  a.volume = 0.6;                 // default playback volume
  try { a.pause(); } catch(e){}

  const playUrl = (url) => {
    a.onended = done; a.onerror = () => _localSpeak(text, btnEl);
    a.src = url; const p = a.play(); if (p && p.catch) p.catch(() => _localSpeak(text, btnEl));
  };

  if (_edgeBlocked) { _localSpeak(text, btnEl); return; }
  const cacheKey = _rate + '|' + text;
  if (_edgeCache.has(cacheKey)) { playUrl(_edgeCache.get(cacheKey)); return; }

  _edgeSynth(text).then(url => {
    _edgeCache.set(cacheKey, url);
    playUrl(url);
  }).catch(() => {
    _edgeBlocked = true;      // network/proxy blocked → don't retry, use local from now
    _localSpeak(text, btnEl);
  });
}

// ---------- Local fallback: best available Web Speech voice ----------
let _voices = [], _bestVoice = null;
function _pickVoice(){
  try { _voices = window.speechSynthesis.getVoices() || []; } catch(e){ _voices = []; }
  if (!_voices.length) return null;
  const en = _voices.filter(v => /^en(-|_)/i.test(v.lang) || /english/i.test(v.name));
  if (!en.length) { _bestVoice = _voices[0]; return _bestVoice; }
  const score = (v) => { const n=(v.name||'').toLowerCase(); let s=0;
    if(/natural|neural|online|wavenet|premium|enhanced/.test(n)) s+=50;
    if(/google/.test(n)) s+=30; if(/microsoft|aria|jenny|guy|libby|sonia/.test(n)) s+=28;
    if(/samantha|karen|daniel|serena|moira/.test(n)) s+=20;
    if(/^en-us/i.test(v.lang)) s+=12; else if(/^en-gb/i.test(v.lang)) s+=10; else s+=4;
    if(v.localService===false) s+=8; return s; };
  en.sort((a,b)=>score(b)-score(a)); _bestVoice = en[0]; return _bestVoice;
}
if ('speechSynthesis' in window) { _pickVoice(); window.speechSynthesis.onvoiceschanged = _pickVoice; }
function _localSpeak(text, btnEl){
  try {
    if (!('speechSynthesis' in window)) { if(btnEl) btnEl.classList.remove('playing'); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = _bestVoice || _pickVoice();
    if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = 'en-US'; }
    u.rate = (RATE_LEVELS[_rate] || RATE_LEVELS.normal).local; u.pitch = 1.0; u.volume = 0.6;
    if (btnEl) { u.onend = () => btnEl.classList.remove('playing'); u.onerror = () => btnEl.classList.remove('playing'); }
    window.speechSynthesis.speak(u);
  } catch (e) { if(btnEl) btnEl.classList.remove('playing'); }
}
const ico = (id, cls) => html`<svg class="ico ${cls || ''}" aria-hidden="true"><use href="#${id}"></use></svg>`;

// ---------- Sentence colorizer (same engine as main app) ----------
const _AUX = new Set(['am','is','are','was','were','do','does','did','can','will','would','should','must','may','have','has','had']);
const _PREP = new Set(['in','on','at','to','with','for','of','from','before','after','behind','under','into','about','every','across']);
const _CONJ = new Set(['and','or','but','so','when','if','because']);
const _BE = new Set(['am','is','are','was','were']);
const _VERBS = new Set(['eat','eats','fly','flies','like','likes','is','are','am','gives','give','make','makes','run','runs','play','plays','has','have','go','goes','sing','sings','see','sees']);

function tokenizeParts(sentence){
  const tokens = sentence.split(/(\s+)/);
  const words = tokens.filter(t=>!/^\s+$/.test(t));
  const clean = words.map(t=>t.toLowerCase().replace(/[.,!?;:]/g,''));
  const roles = new Array(words.length).fill('obj');
  let verbIdx = -1;
  for (let i=0;i<clean.length;i++){ if(_VERBS.has(clean[i])||_BE.has(clean[i])||_AUX.has(clean[i])){verbIdx=i;break;} }
  const firstReal = clean.findIndex(w=>w && !_CONJ.has(w));
  if (verbIdx === -1) verbIdx = firstReal;
  for (let i=0;i<words.length;i++){
    const w = clean[i];
    if (i < verbIdx){ roles[i] = _CONJ.has(w) ? 'other' : 'subj'; }
    else if (i === verbIdx){ roles[i]='verb'; }
    else { if((_AUX.has(w)||/ing$/.test(w)) && roles[i-1]==='verb') roles[i]='verb'; else if(_PREP.has(w)||_CONJ.has(w)) roles[i]='other'; else roles[i]=(roles[i-1]==='other')?'other':'obj'; }
  }
  let wi=0;
  return tokens.map(t => /^\s+$/.test(t) ? {text:t,role:null} : {text:t,role:roles[wi++]});
}
function colorSentence(s){ const p=tokenizeParts(s); return html`${p.map(x=>x.role===null?html`${x.text}`:html`<span class="tk tk--${x.role}">${x.text}</span>`)}`; }

// ---------- Sentence → IPA (per-word lookup, joined) ----------
function sentenceIPA(sentence){
  const dict = window.IPA_DICT || {};
  const words = sentence.split(/\s+/).filter(Boolean);
  const parts = words.map(w => {
    const clean = w.toLowerCase().replace(/[.,!?;:]/g,'');
    const ipa = dict[clean];
    return ipa ? ipa.replace(/^\/|\/$/g,'') : clean; // strip slashes, join later
  });
  return '/' + parts.join(' ') + '/';
}
// render the phonetic line for a sentence
function ipaLine(sentence){
  return html`<div class="ipa-line">${ico('ic-volume','ico--xs')} ${sentenceIPA(sentence)}</div>`;
}

class SentApp extends LitElement {
  static properties = {
    bIndex: { state: true }, bPlaced: { state: true }, bFeedback: { state: true },
    fixReveal: { state: true }, myIndex: { state: true }, myPick: { state: true },
    rate: { state: true }
  };
  createRenderRoot(){ return this; }
  constructor(){
    super();
    this.data = window.SENT_DATA;
    this.bIndex = 0;      // builder question index
    this.bPlaced = [];    // indices of bank words placed, in order
    this.bFeedback = '';  // '', 'ok', 'no'
    this._bank = [];      // shuffled bank for current question
    this._prepBank();
    this.fixReveal = {};  // {index:true} revealed error cards
    this.myIndex = 0;     // 造我自己的句子 · template index
    this.myPick = -1;     // chosen option index
    this.rate = 'normal'; // 语速档位
  }
  // simple offline sound cue (Web Audio) for correct/wrong
  _sound(ok){
    try{
      const AC = window.AudioContext || window.webkitAudioContext; if(!AC) return;
      this._ac = this._ac || new AC();
      const o = this._ac.createOscillator(), g = this._ac.createGain();
      o.connect(g); g.connect(this._ac.destination);
      if(ok){ o.frequency.value=660; o.frequency.setValueAtTime(880,this._ac.currentTime+0.1); }
      else { o.frequency.value=220; }
      g.gain.setValueAtTime(0.12,this._ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,this._ac.currentTime+0.25);
      o.start(); o.stop(this._ac.currentTime+0.26);
    }catch(e){}
  }
  toggleTheme(){ const c=document.documentElement.getAttribute('data-theme'); document.documentElement.setAttribute('data-theme', c==='dark'?'':'dark'); this.requestUpdate(); }
  changeRate(r){ setRate(r); this.rate = r; }
  get isDark(){ return document.documentElement.getAttribute('data-theme')==='dark'; }

  // ---- builder ----
  _prepBank(){
    const q = this.data.builder[this.bIndex];
    this._bank = q.answer.map((w,i)=>({w, i})).sort(()=>Math.random()-0.5);
    this.bPlaced = []; this.bFeedback='';
  }
  placeWord(bankPos){
    if (this.bPlaced.includes(bankPos)) return;
    this.bPlaced = [...this.bPlaced, bankPos];
    const q = this.data.builder[this.bIndex];
    if (this.bPlaced.length === q.answer.length){
      const built = this.bPlaced.map(p=>this._bank[p].w);
      this.bFeedback = built.join(' ')===q.answer.join(' ') ? 'ok' : 'no';
      this._sound(this.bFeedback==='ok');

    }
  }

  nextBuild(){ this.bIndex = (this.bIndex+1) % this.data.builder.length; this._prepBank(); }

  toggleFix(i){ this.fixReveal = { ...this.fixReveal, [i]: !this.fixReveal[i] }; }
